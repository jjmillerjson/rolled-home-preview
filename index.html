    // QR CODE
    // ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
    // Wave 2 channel tracking ‚Äî QR payload is `<loyalty_id>|<channel>` so
    // the FOH scanner can tag every stamp with where it came from. Channel
    // is detected from userAgent at QR-generation time.
    //   iOS Safari/Chrome (incl. iPadOS-on-Mac sniffing) ‚Üí app-ios
    //   Android (Chrome / Samsung / etc.)                ‚Üí app-android
    //   Everything else (desktop dev, edge cases)         ‚Üí unknown
    // The visible pill below the QR stays as the bare loyalty_id so
    // customers still see something memorable.
    function detectAppChannel() {
      if (typeof navigator === 'undefined') return 'unknown';
      const ua = navigator.userAgent || '';
      const isIOS = /iPad|iPhone|iPod/.test(ua) || (/Mac/.test(ua) && (navigator.maxTouchPoints || 0) > 1);
      if (isIOS) return 'app-ios';
      if (/Android/i.test(ua)) return 'app-android';
      return 'unknown';
    }

    function QRCodeDisplay({ loyaltyId, compact }) {
      const canvasRef = useRef(null);
      // Compact (Home carousel) renders the QR smaller so the whole Home fits
      // one phone screen above the pinned nav; full size elsewhere.
      const qrPx = compact ? 150 : 180;
      useEffect(() => {
        if (canvasRef.current && loyaltyId) {
          const qrValue = loyaltyId + '|' + detectAppChannel();
          QRCode.toCanvas(canvasRef.current, qrValue, { width: qrPx, margin: 0, color: { dark: '#00392c', light: '#fefaf0' } });
        }
      }, [loyaltyId, qrPx]);
      return html`<div class="qr-section ${compact ? 'qr-section--home' : ''}">${compact ? null : html`<span class="qr-eyebrow">Scan to collect</span>`}<div class="qr-box"><canvas ref=${canvasRef} /><div class="qr-pill">${loyaltyId}</div></div><span class="qr-hint">Show staff <b>after</b> payment to collect your stamp</span></div>`;
    }

      if (!m) return 'rgba(212,251,111,' + alpha + ')';
      const n = parseInt(m[1], 16);

      const j = d % 10, k = d % 100;
      if (k >= 11 && k <= 13) return d + 'th';
      if (j === 1) return d + 'st';
      if (j === 2) return d + 'nd';
      if (j === 3) return d + 'rd';
      return d + 'th';
    }

    function WalletButtons({ showToast, onDismiss, variant }) {
      const [loadingGoogle, setLoadingGoogle] = useState(false);
      const [loadingApple, setLoadingApple] = useState(false);
      // Mini variant (Home carousel) picks the platform-appropriate single
      // action so it fits one line; full variant shows both chips.
      const isApplePlatform = /iPhone|iPad|iPod|Macintosh/i.test(navigator.userAgent);

      // Wave 16 polish ‚Äî reset the loading state on pageshow. The Google
      // Wallet save flow does a full navigation away (window.location.href
      // = save_url), so when the user comes back the component's
      // 'Opening‚Ä¶' state would otherwise stay stuck indefinitely
      // (especially on BFCache restore). pageshow fires on both a fresh
      // load AND a BFCache restore, so it covers all the return paths.
      useEffect(() => {
        const onPageShow = () => {
          setLoadingGoogle(false);
          setLoadingApple(false);
        };
        window.addEventListener('pageshow', onPageShow);
        return () => window.removeEventListener('pageshow', onPageShow);
      }, []);

      const onAddGoogle = async () => {
        if (loadingGoogle) return;
        setLoadingGoogle(true);
        try {
          const res = await api('/api/v1/customers/me/wallet/google', { method: 'POST' });
          if (res && res.ready && res.save_url) {
            if (onDismiss) onDismiss();
            window.location.href = res.save_url;
            return;
          }
          showToast && showToast("Wallet pass isn't ready yet \u2014 try again soon", 'error');
        } catch (err) {
          showToast && showToast(err.message || "Couldn't add to Wallet", 'error');
        }
        setLoadingGoogle(false);
      };

      // Apple Wallet returns the .pkpass binary directly, not JSON, so we
      // bypass the api() helper (which JSON-parses every response) and use
      // raw fetch + blob handoff. On iOS Safari the .pkpass mime triggers
      // Wallet.app automatically; on Android it just downloads the file.
      const onAddApple = async () => {
        if (loadingApple) return;
        setLoadingApple(true);
        try {
          const token = getToken();
          const res = await fetch(`${API_BASE}/api/v1/customers/me/wallet/apple?_t=${Date.now()}`, {
            method: 'POST',
            headers: token ? { 'Authorization': `Bearer ${token}` } : {},
            cache: 'no-store',
          });
          if (!res.ok) {
            // 501 = endpoint not yet configured server-side, anything else = unexpected
            const msg = res.status === 501
              ? "Apple Wallet isn't ready yet \u2014 try again soon"
              : `Couldn't add to Wallet (${res.status})`;
            showToast && showToast(msg, 'error');
            setLoadingApple(false);
            return;
          }
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          if (onDismiss) onDismiss();
          // Navigate the current tab to the blob URL \u2014 iOS Safari picks the
          // pkpass mime type and hands it off to Wallet.app. Anchor download
          // would suppress the Wallet handoff on iOS, so plain navigation.
          window.location.href = url;
          // Defer revoke so the navigation has time to consume it.
          setTimeout(() => URL.revokeObjectURL(url), 60_000);
        } catch (err) {
          showToast && showToast(err.message || "Couldn't add to Wallet", 'error');
        }
        setLoadingApple(false);
      };

      if (variant === 'mini') {
        const loading = isApplePlatform ? loadingApple : loadingGoogle;
        const onAdd = isApplePlatform ? onAddApple : onAddGoogle;
        const glyph = isApplePlatform
          ? html`<svg viewBox="0 0 384 512" fill="currentColor" aria-hidden="true"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>`
          : html`<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path fill="#4285F4" d="M44 24c0-1.4-.1-2.7-.4-4H24v8h11.3c-.5 2.7-2 5-4.3 6.5v5.4h7c4.1-3.8 6.4-9.4 6.4-15.9z"/><path fill="#34A853" d="M24 44c5.8 0 10.6-1.9 14.1-5.2l-7-5.4c-1.9 1.3-4.4 2-7.1 2-5.5 0-10.1-3.7-11.8-8.7H5.1v5.5C8.6 39.6 15.8 44 24 44z"/><path fill="#FBBC05" d="M12.2 26.7c-.4-1.3-.7-2.6-.7-4s.2-2.7.7-4v-5.5H5.1C3.7 16.3 3 19.1 3 22s.7 5.7 2.1 8.3l7.1-5.6z"/><path fill="#EA4335" d="M24 11.3c3.2 0 6 1.1 8.2 3.2l6.1-6.1C34.5 4.9 29.7 3 24 3 15.8 3 8.6 7.4 5.1 13.7l7.1 5.5C13.9 15 18.5 11.3 24 11.3z"/></svg>`;
        return html`
          <div class="wallet-mini">
            <button class="wallet-mini-btn" onClick=${onAdd} disabled=${loading}>
              ${glyph}
              ${loading ? 'Opening‚Ä¶' : 'Add card to wallet'}
            </button>
          </div>`;
      }

      return html`
        <div class="wallet-buttons">
          <div class="wallet-row">
            <button class="wallet-chip" onClick=${onAddGoogle} disabled=${loadingGoogle}>
              <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path fill="#4285F4" d="M44 24c0-1.4-.1-2.7-.4-4H24v8h11.3c-.5 2.7-2 5-4.3 6.5v5.4h7c4.1-3.8 6.4-9.4 6.4-15.9z"/><path fill="#34A853" d="M24 44c5.8 0 10.6-1.9 14.1-5.2l-7-5.4c-1.9 1.3-4.4 2-7.1 2-5.5 0-10.1-3.7-11.8-8.7H5.1v5.5C8.6 39.6 15.8 44 24 44z"/><path fill="#FBBC05" d="M12.2 26.7c-.4-1.3-.7-2.6-.7-4s.2-2.7.7-4v-5.5H5.1C3.7 16.3 3 19.1 3 22s.7 5.7 2.1 8.3l7.1-5.6z"/><path fill="#EA4335" d="M24 11.3c3.2 0 6 1.1 8.2 3.2l6.1-6.1C34.5 4.9 29.7 3 24 3 15.8 3 8.6 7.4 5.1 13.7l7.1 5.5C13.9 15 18.5 11.3 24 11.3z"/></svg>
              ${loadingGoogle ? 'Opening\u2026' : 'Google Wallet'}
            </button>
            <button class="wallet-chip" onClick=${onAddApple} disabled=${loadingApple}>
              <svg viewBox="0 0 384 512" fill="#00392c" aria-hidden="true"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>

      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

        setError(''); setLoading(true);
        try {
          const res = await api('/api/v1/auth/login', { method: 'POST', body: JSON.stringify({ email: email.trim().toLowerCase(), password }) });

          if (!token) { setError('Login succeeded but no token received'); setLoading(false); return; }
          setToken(token); onLogin(res.customer);

        setLoading(false);

    // Wave 14.2 \u2014 Live preview card shown inside the signup flow. Cycles
    // through all 8 stamps once when the customer first types their name
    // (with a small celebration on the 8th), then "rewinds" to settle at the
    // 2 stamps they'll actually receive on signup. Endowed-progress effect:
    // customer sees their name on a card BEFORE submitting + an ambitious
    // preview of the full reward state, then a concrete starter state.
    function SignupPreviewCard({ firstName, handleSettled, triggerNow }) {
      const trimmed = (firstName || '').trim();
      const hasName = trimmed.length > 0;
      // Phase: 'idle' = no name yet (placeholder card)
      //        'cycling' = animating stamps 0..8
      //        'celebrating' = brief celebration when 8th lands
      //        'settled' = card showing the actual 2 starter stamps
      const [phase, setPhase] = useState('idle');
      const [stampCount, setStampCount] = useState(0);
      // Wave 14.2 design (RESTORED 2026-05-15 after Wave 16 detour):
      // Trigger: Enter-key on the first-name input only (path (b) below).
      // The earlier 800ms-debounce path (a) was removed 2026-05-15 per JJ
      // because it could fire mid-typing when the customer paused to think
      // (e.g. before adding a middle name) ‚Äî pre-empting the actual commit
      // moment. Enter is the explicit "I'm done typing my name" gesture,
      // and it also blurs the input so the mobile keyboard dismisses BEFORE
      // the celebration plays (so the user actually sees the animation
      // instead of it playing behind the keyboard).
      // firedRef guards one-shot semantics.
      //
      // Why pre-submit (not post-submit): the FREE SUSHI moment is the
      // endowed-progress hook that converts. Customer sees an ambitious
      // preview of the full reward state BEFORE committing, then a
      // concrete starter state. Tested in production for ~6 weeks pre-
      // Wave 16 polish; conversion strong enough that we're not relocating it.
      //
      // Timing (per JJ - fast cycle, savoured celebration):
      //   Stamp cadence: 220ms per stamp = ~1.8s for the full 0->8 fill
      //   Celebration hold: 2400ms - long enough to enjoy the 8/8 state
      //   Rewind to 2:     instant - customer already had their dopamine hit
      const firedRef = useRef(false);
      const startCycle = () => {
        if (firedRef.current) return;
        firedRef.current = true;
        setPhase('cycling');
        let current = 0;
        const interval = setInterval(() => {
          current += 1;
          setStampCount(current);
          if (current >= 8) {
            clearInterval(interval);
            setPhase('celebrating');
            setTimeout(() => { setStampCount(2); setPhase('settled'); }, 2400);
          }
        }, 220);
      };
      // Enter-key path: parent increments triggerNow on Enter; this effect
      // bypasses the debounce and fires the cycle right now.
      useEffect(() => {
        if (!triggerNow || !hasName) return;
        startCycle();
      }, [triggerNow]);

      // Notify parent when the cycle settles so it can reveal the rest
      // of the form (progressive disclosure: only First Name shown until
      // the name is entered + animation completes). NB: not named
      // `onSettled` because preact treats `on*` props on custom
      // components as DOM event handler bindings and silently drops them.
      const notifiedSettleRef = useRef(false);
      useEffect(() => {
        if (phase === 'settled' && !notifiedSettleRef.current && handleSettled) {
          notifiedSettleRef.current = true;
          handleSettled();
        }
      }, [phase, handleSettled]);

      // Truncate displayed name so a long entry doesn't overflow the card.
      // 20 chars + ellipsis covers virtually every real first name; the
      // INPUT itself isn't capped (we still send the full value to the
      // backend's 100-char limit).
      const NAME_DISPLAY_CAP = 20;
      const cardName = hasName
        ? (trimmed.length > NAME_DISPLAY_CAP ? trimmed.slice(0, NAME_DISPLAY_CAP).toUpperCase() + '‚Ä¶' : trimmed.toUpperCase())
        : 'YOUR NAME';
      let caption;
      // Keep the empty-state caption while the user is still typing (phase
      // stays 'idle' until the 800ms debounce elapses). Avoids a confusing
      // mid-type flash to '0/8 stamps' before the animation actually fires.
      if (phase === 'idle') caption = 'Roll up for free sushi';
      else if (phase === 'settled') caption = 'Your first card \u00b7 2/8 stamps gifted on signup';
      else if (phase === 'celebrating') caption = '8/8 \u2014 free sushi!';
      else caption = `${stampCount}/8 stamps`;

      // Wave 14.2 ‚Äî V2 celebration: confetti burst + FREE SUSHI! text in Gelica.
      // Confetti pieces are generated once per cycle so their random
      // directions/colours feel fresh each time.
      const confettiSeed = phase === 'celebrating' ? Date.now() : 0;
      const confettiPieces = React.useMemo(() => {
        return Array.from({ length: 14 }, (_, i) => {
          const angle = (i / 14) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
          const dist = 70 + Math.random() * 50;
          const colors = ['#d4fb6f', '#fefaf0', '#ffffff', '#f1c544', '#ff7a5c'];
          return {
            dx: Math.cos(angle) * dist,
            dy: Math.sin(angle) * dist,
            rot: (Math.random() - 0.5) * 720,
            color: colors[i % colors.length],
            radius: Math.random() > 0.5 ? '50%' : '2px',
            delay: Math.random() * 0.15,
          };
        });
      }, [confettiSeed]);

      return html`
        <div style=${{
          margin: '8px auto 22px',
          maxWidth: '320px',
          width: '100%',
          padding: '0 0 16px',
          borderRadius: 'var(--r-lg)',

        }}>

              <div style=${{ minWidth: 0, flex: 1 }}>
                <div style=${{ fontSize: '9px', fontWeight: 800, letterSpacing: '1.5px', color: 'rgba(254,250,240,0.55)', textTransform: 'uppercase' }}>Rolled Club Card</div>
                <div style=${{ fontFamily: 'var(--fd)', fontSize: '17px', fontWeight: 700, color: 'var(--kewpie)', marginTop: '2px', letterSpacing: '0.5px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>${cardName}</div>
              </div>
            </div>
          </div>
          <div style=${{ padding: '0 18px' }}>
          ${/* Stamps grid wrapped in a position:relative container so the

             fish, since a 4x2 grid with even rows centres at the gap). */null}
          <div style=${{ position: 'relative', marginBottom: '10px' }}>
            <div style=${{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '10px' }}>
              ${Array.from({ length: 8 }, (_, i) => html`
                <div key=${i} class="signup-preview-stamp" style=${{

            ${phase === 'celebrating' ? html`
              <div style=${{
                position: 'absolute',
                top: '50%',
                left: 0,
                right: 0,
                transform: 'translateY(-50%)',
                display: 'flex',

                justifyContent: 'center',

                fontWeight: 800,

                  <span key=${idx} style=${{
                    display: 'inline-block',

                    transform: 'translateY(8px) scale(0.6)',

                `)}
              </div>
            ` : null}
          </div>
          <div style=${{ fontSize: '11px', color: 'rgba(254,250,240,0.6)', textAlign: 'center', fontFamily: 'var(--fb)', minHeight: '14px' }}>${caption}</div>
          </div>

    }

    // Wave 14.2 ‚Äî wave-line SVG that sits behind the SignupPreviewCard header
    // zone. Mirrors the 16-path pattern from the live customer card's
    // .card-header-waves; uses useEffect to inject the SVG once on mount so
    // we don't pay the cost on every render.
    function SignupCardWaveLines() {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current && !ref.current.hasChildNodes()) {
          const paths = Array.from({ length: 16 }, (_, i) => {
            const y = -130 + i * 26;
            return '<path d="M-300,' + y + ' Q-220,' + (y + 26) + ' -140,' + y + ' Q-60,' + (y - 26) + ' 20,' + y + ' Q100,' + (y + 26) + ' 180,' + y + ' Q260,' + (y - 26) + ' 340,' + y + ' Q420,' + (y + 26) + ' 500,' + y + ' Q580,' + (y - 26) + ' 660,' + y + '"/>';
          }).join('');
          ref.current.innerHTML = '<svg viewBox="0 0 340 70" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden"><g transform="rotate(-25, 170, 35)"><g style="animation:waveSlide 3s linear infinite"><g stroke="rgba(212,251,111,0.10)" fill="none" stroke-width="1.8" stroke-linecap="round">' + paths + '</g></g></g></svg>';
        }
      }, []);
      return html`<div ref=${ref} style=${{ position: 'absolute', inset: 0, zIndex: 0, overflow: 'hidden', pointerEvents: 'none' }}></div>`;
    }

    function SignupScreen({ onSignup, onSwitch, showToast, signupSource, onShowPrivacy, marketingCopy }) {

      // handleSettled when phase reaches 'settled' (~5s after the customer
      // pauses typing). Once true, stays true.
      const [formExpanded, setFormExpanded] = useState(false);
      const handleCardSettled = useCallback(() => setFormExpanded(true), []);
      // Wave 14.2 - Enter-key gesture on the First Name input. Bumps a

      // and (b) bypasses the 800ms debounce + fires the cycle right now.
      const [enterCount, setEnterCount] = useState(0);
      const handleNameKeyDown = (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          e.target.blur();
          setEnterCount(c => c + 1);
        }
      };
            // Wave 14.2 ‚Äî when the rest of the form reveals, smoothly scroll the
      // preview card to the top of the viewport so the Email field lands in
      // the natural thumb zone (centre of screen) instead of the user having
      // to scroll down to find it. Uses double-rAF to ensure the form-rest
      // mount + flex auto-margin recalc are committed before the scroll
      // measures positions.
      const cardScrollRef = useRef(null);
      useEffect(() => {
        if (!formExpanded) return;
        let raf1, raf2, fallbackTimer;
        raf1 = requestAnimationFrame(() => {
          raf2 = requestAnimationFrame(() => {
            const el = cardScrollRef.current;
            if (!el) return;
            const screen = el.closest('.auth-screen');
            if (screen) {
              // Directly compute the target scrollTop so it works regardless
              // of which ancestor scrollIntoView picks.
              const targetTop = el.offsetTop;
              screen.scrollTo({ top: targetTop, behavior: 'smooth' });
            } else {
              el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
          });
        });
        // Fallback: if for some reason rAF doesn't fire fast enough, force
        // the scroll after 350ms.
        fallbackTimer = setTimeout(() => {
          const el = cardScrollRef.current;
          if (!el) return;
          const screen = el.closest('.auth-screen');
          if (screen && screen.scrollTop < 30) {
            screen.scrollTo({ top: el.offsetTop, behavior: 'smooth' });
          }
        }, 350);
        return () => {
          if (raf1) cancelAnimationFrame(raf1);
          if (raf2) cancelAnimationFrame(raf2);
          clearTimeout(fallbackTimer);
        };
      }, [formExpanded]);
      const mCopy = marketingCopy || MARKETING_COPY_FALLBACK;
      const monthRef = useRef(null);
      const yearRef = useRef(null);
      const handleDobDay = (v) => { setDobDay(v); if (v.length === 2 && monthRef.current) monthRef.current.focus(); };
      const handleDobMonth = (v) => { setDobMonth(v); if (v.length === 2 && yearRef.current) yearRef.current.focus(); };
      // Wave 14.2 \u2014 "Tick all" button: ticks both opt-in boxes simultaneously
      // but each remains independently visible + togglable. Legally distinct
      // from a single bundled-consent box (which UK PECR forbids).
      const tickAll = () => { setMarketingOptIn(true); setMarketingSmsOptIn(true); };
      const handleSubmit = async () => {
        setError('');
        // Per-field validation in form-reading order so the error message
        // is always specific to the first thing the user needs to fix.
        if (!firstName.trim()) { setError('Please enter your first name'); return; }
        const trimmedEmail = email.trim();
        if (!trimmedEmail) { setError('Please enter your email address'); return; }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(trimmedEmail)) { setError("That email doesn\u2019t look right \u2014 double-check it"); return; }
        if (!dobDay || !dobMonth || !dobYear) { setError('Please enter your date of birth'); return; }
        const day = parseInt(dobDay, 10);
        const month = parseInt(dobMonth, 10);
        const year = parseInt(dobYear, 10);
        if (isNaN(month) || month < 1 || month > 12) { setError('Please enter a valid month (1\u201312)'); return; }
        if (isNaN(day) || day < 1 || day > 31) { setError('Please enter a valid day (1\u201331)'); return; }
        if (isNaN(year) || year < 1900 || year > new Date().getFullYear()) { setError('Please enter a valid year'); return; }
        const testDate = new Date(year, month - 1, day);
        if (testDate.getFullYear() !== year || testDate.getMonth() !== month - 1 || testDate.getDate() !== day) { setError('That date doesn\u2019t exist \u2014 please check your date of birth'); return; }
        const now = new Date();
        let age = now.getFullYear() - year;
        if (now.getMonth() + 1 < month || (now.getMonth() + 1 === month && now.getDate() < day)) age--;
        if (age < 16) { setError('You must be at least 16 years old to sign up'); return; }
        // Wave 14.2 \u2014 phone is optional but if provided must look plausible.
        // International numbers accepted: digits, spaces, plus, brackets, dashes.
        // Stripped digit count must be 8-15 per ITU E.164 spec.
        const trimmedPhone = phone.trim();
        if (trimmedPhone) {
          if (!/^[+0-9 ()\-]+$/.test(trimmedPhone)) { setError('Phone can only contain numbers, spaces, +, -, and brackets'); return; }
          const phoneDigits = trimmedPhone.replace(/[^\d]/g, '');
          if (phoneDigits.length < 8) { setError('Phone number is too short \u2014 needs at least 8 digits'); return; }
          if (phoneDigits.length > 15) { setError('Phone number is too long \u2014 max 15 digits'); return; }
        }
        if (!password) { setError('Please choose a password'); return; }
        if (password.length < 8) { setError('Password must be at least 8 characters'); return; }
        const dob = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        setLoading(true);
        try {
          await api('/api/v1/auth/signup', { method: 'POST', body: JSON.stringify({
            firstName: firstName.trim(),
            email: email.trim().toLowerCase(),
            dateOfBirth: dob,
            password,
            ...(signupSource ? { signupSource } : {}),
            ...(trimmedPhone ? { phone: trimmedPhone } : {}),
            ...(gender ? { gender } : {}),
            ...(marketingOptIn ? { marketingOptIn: true } : {}),
            ...(marketingSmsOptIn ? { marketingSmsOptIn: true } : {}),
          }) });
          setShowVerify(true);

        setLoading(false);
      };
      // Post-submit verification-pending screen (Wave 14.2 ‚Äî O3 progress bar
      // with Roo hopping along the filled portion, "Back to Sign In" button
      // removed because the verification link in the email will eventually
      // land the user back signed-in. Auto-sign-in on verification still
      // needs a backend change ‚Äî flagged for Adam, see Notion handover.)
      if (showVerify) return html`<div class="auth-screen fade-in" style=${{ textAlign: 'center' }}>
        <div class="verify-bar-wrap">
          <div class="verify-bar-track">
            <div class="verify-bar-fill">
              <div class="verify-bar-shimmer"></div>
            </div>
            <div class="verify-bar-edge-glow"></div>
            <div class="verify-bar-roo"><${RooIcon} color="#d4fb6f" size=${22} /></div>
          </div>
          <div class="verify-bar-meta"><strong>Step 2 of 3</strong> ¬∑ Verify your email to unlock your card</div>
        </div>
        <div style=${{ fontSize: '40px', marginBottom: '12px' }}>\u{1F4E7}</div>
        <div class="t-title" style=${{ marginBottom: '10px' }}>Check your email</div>
        <p class="t-body c-muted" style=${{ marginBottom: '6px' }}>We've sent a verification link to <strong style=${{ color: 'var(--kewpie)' }}>${email}</strong>. Tap it, then you're officially in the Club.</p>
        <p class="t-micro c-faint" style=${{ marginBottom: '24px' }}>Can't find it? Check your junk or spam folder.</p>
      </div>`;
      // Reusable inline-checkbox styles for the two opt-in rows.
      const optInRowStyle = { display: 'flex', alignItems: 'flex-start', gap: '10px', marginBottom: '10px', padding: '12px 14px', background: 'rgba(212,251,111,0.06)', border: '1px solid rgba(212,251,111,0.15)', borderRadius: 'var(--r-md)' };
      const checkboxStyle = { marginTop: '2px', accentColor: 'var(--wasabi)', cursor: 'pointer', flexShrink: 0, width: '16px', height: '16px' };
      const checkboxLabelStyle = { fontSize: '12px', color: 'var(--kewpie-muted)', cursor: 'pointer', lineHeight: '1.4' };
      return html`
        <div class="auth-screen fade-in">
          <div class="auth-logo"><img src="/rolled-logo.svg" alt="Rolled" onerror="this.onerror=null;this.parentElement.innerHTML='<span class=\\'t-hero\\'>ROLLED</span>'" /></div>

          ${formExpanded ? html`
          <div class="form-rest">

    // Club-card body "pool" effect: caustic dapple + faint sparkles scattered
    // across the whole Nori body (the dark "water"); the soy-fish swim on top.
    // Pure-CSS animations (no gyro), injected once on mount like WaveLines.
    function PoolEffect({ sparkOnly }) {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const W = el.clientWidth || 320, H = el.clientHeight || 130;
        let out = '';
        const place = (n, cls, smin, srange, dmin, dstep, dmod) => {
          const cols = Math.max(1, Math.round(Math.sqrt(n * W / H))), rows = Math.ceil(n / cols);
          const cw = W / cols, ch = H / rows;
          for (let i = 0; i < n; i++) {
            const col = i % cols, row = Math.floor(i / cols);
            const jx = (((i * 53) % 100) / 100 - 0.5), jy = (((i * 37) % 100) / 100 - 0.5);
            const x = col * cw + cw * 0.5 + jx * cw * 0.7, y = row * ch + ch * 0.5 + jy * ch * 0.7;
            const s = smin + ((i * 29) % srange);
            const d = dmin + (i % 6) * dstep, dl = -((i * 1.3) % dmod);
            out += '<div class="' + cls + '" style="left:' + (x - s / 2) + 'px;top:' + (y - s / 2) + 'px;width:' + s + 'px;height:' + s + 'px;animation-duration:' + d + 's;animation-delay:' + dl + 's"></div>';
          }
        };
        if (!sparkOnly) place(10, 'pool-patch', 44, 32, 6, 0.7, 7);
        place(9, 'pool-spark', 4, 4, 9, 1.3, 14);
        el.innerHTML = out;
      }, [sparkOnly]);
      return html`<div ref=${ref} class="pool-fx"></div>`;
    }

    // ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
    function HomeScreen({ profile, card, stamps, onRefresh, showToast, marketingCopy, onNavigate }) {
      const mCopy = marketingCopy || MARKETING_COPY_FALLBACK;
      const walletDismissKey = profile?.id ? `wallet_dismissed:${profile.id}` : null;
      const [walletDismissed, setWalletDismissed] = useState(() => walletDismissKey && localStorage.getItem(walletDismissKey) === '1');
      const dismissWallet = () => { if (walletDismissKey) localStorage.setItem(walletDismissKey, '1'); setWalletDismissed(true); };
      const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const showWalletPrompt = isMobile && !walletDismissed;

      // Wave 14.5 ‚Äî configurable marketing-prompt triggers.
      // Replaces Wave 10's hardcoded post-reward popup. Server-side
      // /api/v1/marketing-prompts/eligible decides which of the 4 triggers
      // (post_reward / post_tier_upgrade / post_6_of_8 / post_birthday_card)
      // fires for this customer right now ‚Äî eligibility chains active toggle,
      // opt-in status, trigger-specific state, cooldown window, and the
      // re-issue-if-dismissed rule. Customer-app shows index 0 (highest
      // priority) and logs fired/dismissed/converted via POST /event.
      //
      // Why this isn't just "post_reward + 3 sibling popups": cooldown +
      // analytics need server-side truth that survives cache clears + works
      // across the customer's devices. Wave 10's sessionStorage flag did
      // neither.
      const [marketingPrompt, setMarketingPrompt] = useState(null);
      const [marketingPromptSaving, setMarketingPromptSaving] = useState(false);
      const marketingPromptFiredRef = useRef(false);

      // Phase 7d ‚Äî Special cards held by this customer + redemption state.
      //   specialCards    : array of cards from GET /me/special-cards
      //   redeemingCard   : the card the customer's actively redeeming, or null
      //   prevStatusRef   : tracks the redeeming card's status across polls so
      //                     we can detect "available ‚Üí cap_daily / cap_*" =
      //                     a successful scan + auto-close the modal.
      const [specialCards, setSpecialCards] = useState(_specialCardsCache);
      const [redeemingCard, setRedeemingCard] = useState(null);
      const [celebrating, setCelebrating] = useState(false);
      const [celebrateHeld, setCelebrateHeld] = useState(false);
      const prevRedeemingStatusRef = useRef(null);
      const prevRedeemingTimeRef = useRef(null);

      const reloadSpecialCards = useCallback(async () => {
        try {
          const res = await api('/api/v1/customers/me/special-cards');
          // Only replace the list on a clean, well-formed success. A malformed
          // body leaves the current cards untouched.
          if (res && Array.isArray(res.cards)) { _specialCardsCache = res.cards; setSpecialCards(res.cards); }
        } catch (e) {
          // Transient error (rate-limit / network / 5xx) ‚Äî KEEP whatever cards
          // are already on screen instead of blanking them. They refresh on the
          // next successful poll. (Bug: a 429 after navigating used to wipe them.)
        }
      }, []);

      useEffect(() => {
        if (!profile || !profile.id) return;
        reloadSpecialCards();
      }, [profile?.id, reloadSpecialCards]);

      // Poll /me/special-cards while the redemption modal is open. When the
      // active card's status flips from 'available' (typically to 'cap_daily'
      // or similar ‚Äî meaning the scan landed and the cap was hit), we treat
      // that as a successful redemption + auto-close the modal.
      useEffect(() => {
        if (!redeemingCard) {
          prevRedeemingStatusRef.current = null;
          prevRedeemingTimeRef.current = null;
          setCelebrating(false);
          setCelebrateHeld(false);
          return;
        }
        prevRedeemingStatusRef.current = 'available';
        // Baseline the last-redemption stamp at arm time. Uncapped % cards
        // (Mates / Fam / Staff) never flip status on a scan, so we also watch
        // last_redeemed_at advancing to know the scan landed.
        prevRedeemingTimeRef.current = redeemingCard.last_redeemed_at || null;
        const interval = setInterval(async () => {
          try {
            const res = await api('/api/v1/customers/me/special-cards');
            if (!res || !Array.isArray(res.cards)) return;   // malformed ‚Äî keep what's on screen
            const cards = res.cards;
            _specialCardsCache = cards;
            setSpecialCards(cards);
            const updated = cards.find((c) => c.id === redeemingCard.id);
            if (!updated) return;
            const statusFlipped = prevRedeemingStatusRef.current === 'available' && updated.status !== 'available';
            const justRedeemed = updated.last_redeemed_at && updated.last_redeemed_at !== prevRedeemingTimeRef.current;
            if (statusFlipped || justRedeemed) {
              // Scan landed ‚Äî status flip for capped cards, or a fresh redeem
              // stamp for uncapped % cards. Play the "You Beauty!" claim
              // celebration: animate once, then it freezes to a static held
              // state so swiping away + back doesn't replay it. Held 60s.
              setCelebrateHeld(false);
              setCelebrating(true);
            }
            prevRedeemingStatusRef.current = updated.status;
            prevRedeemingTimeRef.current = updated.last_redeemed_at || null;
          } catch {
            // network blip / rate-limit ‚Äî keep the cards on screen, try next tick
          }
        }, 6000);
        return () => clearInterval(interval);
      }, [redeemingCard?.id]);

      // The "You Beauty!" celebration: animate once, then freeze to a static
      // held state after ~1.3s (so re-mounting it on swipe-back doesn't replay
      // the animation), and hold the whole thing 60s ‚Äî regardless of swiping
      // away ‚Äî before returning to Claim / the card's locked state. Tap to
      // dismiss early.
      useEffect(() => {

        const done = setTimeout(() => { setCelebrating(false); setCelebrateHeld(false); setRedeemingCard(null); }, 60000);
        return () => { clearTimeout(freeze); clearTimeout(done); };
      }, [celebrating]);
      useEffect(() => {
        if (!profile || !profile.id) return;
        if (profile.marketing_opt_in === true) return;
        if (marketingPromptFiredRef.current) return;
        // Small delay so it doesn't land on top of the 8/8 celebration overlay.

        const t = setTimeout(async () => {
          if (marketingPromptFiredRef.current) return;

            if (!first || marketingPromptFiredRef.current) return;

              method: 'POST',
              body: JSON.stringify({ outcome: 'fired' }),
            }).catch(() => {});
          } catch (e) {
            // Endpoint not deployed yet, network error, etc. ‚Äî silently no-op,

        }, 2500);
        return () => clearTimeout(t);
      }, [profile?.id, profile?.marketing_opt_in]);
      const screenRef = useRef(null);
      const overlayActiveRef = useRef(false);
      const { pulling } = usePullToRefresh(onRefresh, screenRef, overlayActiveRef);
      const stampCount = card?.stamp_count || 0;
      const isReward = stampCount >= 8;
      const remaining = 8 - stampCount;
      const completedCards = profile?.completed_cards || 0;

      // Tier computation
      const currentTier = parseTier(profile?.loyalty_tier);
      const hasTier = !!currentTier;
      const tierSlug = hasTier ? currentTier.toLowerCase() : 'standard';
      const currentTierData = hasTier ? TIERS.find(t => t.name === currentTier) : null;
      // Next tier follows the customer's CURRENT tier (badge), not their raw card

      const currentTierIdx = currentTier ? TIERS.findIndex(t => t.name === currentTier) : -1;
      const nextTier = TIERS[currentTierIdx + 1] || null;
      const isMaxTier = !nextTier;
      const tierFloor = currentTierData ? currentTierData.req : 0;
      // TEST/DEMO override (customers.demo_cards_to_next, set from the Command

      // maths) is untouched. null/undefined = render normally from the real count.
      const demoCardsToNext = profile?.demo_cards_to_next;
      const hasDemoNext = demoCardsToNext != null && !!nextTier;
      const tierCardsLeft = hasDemoNext
        ? Math.max(0, demoCardsToNext)

      const tierProgress = hasDemoNext
        ? Math.max(0, Math.min(100, ((nextTier.req - demoCardsToNext - tierFloor) / (nextTier.req - tierFloor)) * 100))
        : (nextTier ? Math.max(0, Math.min(100, ((completedCards - tierFloor) / (nextTier.req - tierFloor)) * 100)) : 100);
      // Current tier's reward ‚Äî what completing THIS card unlocks. From REWARD_LADDER
      // so it's correct per tier (Platinum = "3 Free Rolls + Any Dip", base = "2 Free Rolls").
      const currentReward = (REWARD_LADDER.find(r => r.name === tierSlug) || REWARD_LADDER[0]).reward_description;
      const nextTierColor = nextTier ? (TIER_COLORS[nextTier.name] || 'var(--wasabi)') : 'var(--wasabi)';

      // ‚îÄ‚îÄ Animation state ‚îÄ‚îÄ
      const [cardFlipping, setCardFlipping] = useState(false);
      const [cardShining, setCardShining] = useState(false);
      const [tierAnimPhase, setTierAnimPhase] = useState(null);
      const tierAnimOldTier = useRef(null);
      const tierAnimNewTier = useRef(null);
      const prevTierRef = useRef(currentTier);
      const tierChangedOnReset = useRef(false);

      // Refs for imperative animation
      const cardRef = useRef(null);
      const glowRef = useRef(null);
      const waveSvgRef = useRef(null);
      const particlesRef = useRef(null);
      const stampGridRef = useRef(null);

      // Celebration: 8/8 "You Beauty" overlay
      const [showCelebration, setShowCelebration] = useState(false);
      const [celebrationFading, setCelebrationFading] = useState(false);
      const [celebrationDismissed, setCelebrationDismissed] = useState(false);

      const celebrationShownForCard = useRef(null);

      useLayoutEffect(() => { if (!isReward || !card?.card_id) return; const key = 'celebration_shown_' + card.card_id; if (sessionStorage.getItem(key) || celebrationShownForCard.current === card.card_id) return; celebrationShownForCard.current = card.card_id; sessionStorage.setItem(key, '1'); setShowCelebration(true); }, [isReward, card?.card_id]);
      const dismissCelebration = (e) => {
        if (e) e.stopPropagation();
        setCelebrationDismissed(true);
        setTimeout(() => {
          setCelebrationFading(true);
          setTimeout(() => { setShowCelebration(false); setCelebrationFading(false); setCelebrationDismissed(false); }, 350);
        }, 100);
      };


      // Refs needed before synchronous display logic
      const frozenStampRef = useRef(null);

      // Synchronous celebration detection ‚Äî prevents reward flash during overlay fade-in
      const celebrationPending = isReward && !!card?.card_id && celebrationShownForCard.current !== card.card_id && !sessionStorage.getItem('celebration_shown_' + (card?.card_id || ''));
      const hideReward = (showCelebration || celebrationPending) && !celebrationDismissed;
      const displayStampCount = frozenStampRef.current !== null ? frozenStampRef.current : (hideReward ? Math.min(stampCount, 7) : stampCount);
      const displayIsReward = hideReward ? false : isReward;
      // Club-card 8/8 claim flow (mirrors special cards): the Claim button arms the QR.
      const [clubArmed, setClubArmed] = useState(false);
      useEffect(() => { if (!displayIsReward) setClubArmed(false); }, [displayIsReward]);
      const displayRemaining = 8 - displayStampCount;
      // Card Redeemed overlay
      const [showRedeemed, setShowRedeemed] = useState(false);
      const [showScanQR, setShowScanQR] = useState(false);   // Option 2: collecting-state QR opens on demand (keeps the home short, QR bigger when shown)
      const [redeemedFading, setRedeemedFading] = useState(false);
      overlayActiveRef.current = showCelebration || showRedeemed;
      const prevStampRef = useRef(stampCount);
      const prevCardIdRef = useRef(card?.card_id);
      const frozenTierRef = useRef(null);
      const needsRedeemedRef = useRef(false);

      // ‚îÄ‚îÄ SYNCHRONOUS card change detection (runs during render, BEFORE display) ‚îÄ‚îÄ
      if (card?.card_id && prevCardIdRef.current && card.card_id !== prevCardIdRef.current) {
        frozenTierRef.current = prevTierRef.current ? prevTierRef.current.toLowerCase() : 'standard';
        frozenStampRef.current = 8;
        tierChangedOnReset.current = (currentTier !== prevTierRef.current);
        tierAnimOldTier.current = prevTierRef.current;
        tierAnimNewTier.current = currentTier ? currentTier.toLowerCase() : tierSlug;

      prevStampRef.current = stampCount;

      // Effect to show overlay (can't setState during render)
      useEffect(() => {

      // Display tier: use frozen ref when active, or old tier during animation phases (buildup/intense/sweep/reveal)
      // During 'reveal', old tier stays as base while new tier fades in as overlay
      const displayTierSlug = frozenTierRef.current !== null ? frozenTierRef.current
        : (tierAnimPhase === 'buildup' || tierAnimPhase === 'intense' || tierAnimPhase === 'sweep' || tierAnimPhase === 'reveal') ? (tierAnimOldTier.current ? tierAnimOldTier.current.toLowerCase() : 'standard')
        : tierSlug;
      const displayHasTier = displayTierSlug !== 'standard';
      const displayTierName = displayHasTier ? displayTierSlug.charAt(0).toUpperCase() + displayTierSlug.slice(1) : null;

      const dismissRedeemed = (e) => {

        setRedeemedFading(true);
        setTimeout(() => {

          setRedeemedFading(false);

            frozenStampRef.current = null;

            }, 800);
          }
        }, 350);
      };

      // ‚îÄ‚îÄ V2 Wave Lines Sweep ‚Äî Tier Upgrade Animation ‚îÄ‚îÄ
      const playTierUpgrade = () => {

        setTimeout(() => {

            glowRef.current.style.borderColor = 'rgba(212,251,111,0.5)';
            glowRef.current.style.opacity = '1';
          }
        }, 100);

        setTimeout(() => {
          setTierAnimPhase('intense');
          if (glowRef.current) glowRef.current.style.borderColor = 'rgba(212,251,111,0.8)';
        }, 800);

          setTierAnimPhase('sweep');
          frozenStampRef.current = 0;
          if (glowRef.current) { glowRef.current.style.transition = 'opacity 0.4s'; glowRef.current.style.opacity = '0'; }
          if (waveSvgRef.current) {
            const wl = waveSvgRef.current;
            wl.style.transition = 'none'; wl.style.transform = 'translateX(-65%)'; wl.style.opacity = '1';
            requestAnimationFrame(() => requestAnimationFrame(() => {
              wl.style.transition = 'transform 1.1s cubic-bezier(0.22,1,0.36,1)';
              wl.style.transform = 'translateX(5%)';
            }));
            setTimeout(() => { wl.style.transition = 'opacity 0.5s ease-out'; wl.style.opacity = '0'; }, 750);
          }
          if (particlesRef.current) {
            const px = particlesRef.current;
            px.innerHTML = '';
            for (let i = 0; i < 18; i++) {
              const p = document.createElement('div');
              const sz = 2 + Math.random() * 5;
              const sx = 30 + Math.random() * 280;
              const sy = 5 + Math.random() * 40;
              p.style.cssText = 'position:absolute;left:' + sx + 'px;top:' + sy + 'px;width:' + sz + 'px;height:' + sz + 'px;border-radius:50%;background:rgba(' + (Math.random() > 0.4 ? '212,251,111' : '254,250,240') + ',' + (0.4 + Math.random() * 0.4) + ');pointer-events:none;opacity:0;';
              px.appendChild(p);
              setTimeout(() => {
                p.style.transition = 'all 0.8s cubic-bezier(0.22,1,0.36,1)';
                p.style.opacity = '1';
                p.style.top = (sy - 12 - Math.random() * 35) + 'px';
                p.style.left = (sx + 10 + Math.random() * 25) + 'px';
                setTimeout(() => { p.style.opacity = '0'; }, 450);
                setTimeout(() => p.remove(), 950);
              }, Math.random() * 250);
            }
          }
          setTimeout(() => { frozenTierRef.current = null; setTierAnimPhase('reveal'); }, 450);
        }, 1400);

        // New stamp pops in on the fresh card
        setTimeout(() => {
          frozenStampRef.current = null;
          setTierAnimPhase('newstamp');
        }, 2800);

        // Shine sweeps across the whole card
        setTimeout(() => {
          setTierAnimPhase('shine');
          setCardShining(true);
        }, 3400);

        // Cleanup
        setTimeout(() => {
          setTierAnimPhase(null);
          setCardShining(false);
          if (glowRef.current) {
            glowRef.current.style.transition = 'none';
            glowRef.current.style.borderColor = 'transparent';
            glowRef.current.style.opacity = '0';
          }
          if (waveSvgRef.current) {
            waveSvgRef.current.style.transition = 'none';
            waveSvgRef.current.style.transform = 'translateX(-65%)';
            waveSvgRef.current.style.opacity = '0';
          }
          if (particlesRef.current) particlesRef.current.innerHTML = '';
          frozenTierRef.current = null;
          frozenStampRef.current = null;
        }, 6000);
      };

      const stampSlots = Array.from({ length: 8 }, (_, i) => {
        if (i >= displayStampCount) return { state: 'empty' };
        if (i === 7 && displayStampCount >= 8) return { state: 'reward' };
        if (stamps && stamps[i] && stamps[i].is_bonus) return { state: 'bonus' };
        return { state: 'filled' };
      });

      // Polling + visibilitychange
      const onRefreshRef = useRef(onRefresh);
      onRefreshRef.current = onRefresh;
      useEffect(() => { const interval = setInterval(async () => { if (document.visibilityState === 'visible') { try { await onRefreshRef.current(); } catch {} } }, POLL_INTERVAL); return () => clearInterval(interval); }, []);
      useEffect(() => { const handleVisible = () => { if (document.visibilityState === 'visible') { onRefreshRef.current().catch(() => {}); } }; document.addEventListener('visibilitychange', handleVisible); window.addEventListener('focus', handleVisible); return () => { document.removeEventListener('visibilitychange', handleVisible); window.removeEventListener('focus', handleVisible); }; }, []);
      // Auto-dismiss the on-demand "Scan to collect" QR the moment the stamp actually lands (staff
      // scanned it). While the QR is open we poll faster (3s) so the new stamp is caught quickly.
      const scanOpenStampRef = useRef(null);
      useEffect(() => {
        if (!showScanQR) { scanOpenStampRef.current = null; return; }
        scanOpenStampRef.current = stampCount;
        const iv = setInterval(() => { if (document.visibilityState === 'visible') onRefreshRef.current().catch(() => {}); }, 3000);
        return () => clearInterval(iv);
      }, [showScanQR]);
      useEffect(() => {
        if (showScanQR && scanOpenStampRef.current !== null && stampCount > scanOpenStampRef.current) {
          setShowScanQR(false);
          showToast('Stamp added ‚Äî nice one! \u{1F41F}', 'success');
        }
      }, [stampCount, showScanQR]);
      const firstName = profile?.first_name || 'mate';
      const loyaltyId = profile?.loyalty_id || '';

      // ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
      // PHASE 7e ‚Äî Wallet-style card carousel engine.

      // special faces. Motion is driven IMPERATIVELY (direct node

      // per drag frame. `centre` is a continuous float kept in a ref;
      // `activeIndex` (0..N-1) is the only React state the engine sets,

      // ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
      const N = 1 + specialCards.length;
      const stageRef = useRef(null);
      const slotRefs = useRef([]);          // card nodes, index-aligned
      const centreRef = useRef(0);          // continuous carousel position
      const dimsRef = useRef({ V: 0, W: 0, D: 0, DRAG: 1 });
      const dragRef = useRef({ active: false, baseC: 0, pressedIdx: null, startX: 0, moved: 0, vx: 0, lastX: 0, lastT: 0 });
      const rafRef = useRef(0);
      const clubMeasureRef = useRef(null);  // measures club-card height
      const CARD_SCALE = 0.92;  // ALL carousel cards (club + special faces) render at this fraction of the old width ‚Äî a touch smaller AND uniform, so the club card matches the special faces as a side peek (no odd narrow club). Each card fills its own slot ‚Üí no ghost outline.
      const [stageHeight, setStageHeight] = useState(0);
      const [activeIndex, setActiveIndex] = useState(0);
      // Reveal gate ‚Äî the stage is opacity:0 until the first measure with a
      // real width has positioned every slot, so login never flashes a stack
      // of un-positioned cards (PHASE 7e2 carousel-stability fix).
      const [ready, setReady] = useState(false);
      const readyRef = useRef(false);
      const markReady = useCallback(() => {
        if (readyRef.current) return;
        readyRef.current = true;
        setReady(true);
      }, []);

      // keep activeIndex valid if the special-cards list shrinks
      useEffect(() => {
        if (activeIndex > N - 1) {
          const c = Math.round(centreRef.current);
          centreRef.current = ((c % N) + N) % N;
          setActiveIndex(((Math.round(centreRef.current) % N) + N) % N);
        }
      }, [N]);

      const relOf = useCallback((i) => {
        const r = i - centreRef.current;
        return r - N * Math.round(r / N);
      }, [N]);

      const layout = useCallback(() => {
        const { D } = dimsRef.current;
        const nodes = slotRefs.current;
        for (let i = 0; i < nodes.length; i++) {
          const node = nodes[i];
          if (!node) continue;
          const r = relOf(i);
          const a = Math.abs(r);
          node.classList.toggle('is-centre', a < 0.5);   // only the facing card animates / tilts
          let x, s, b, o;
          if (a <= 1) {
            x = r * D;            s = 1 - 0.08 * a;        b = 1 - 0.20 * a;        o = 1;
          } else if (a < 2) {
            const sign = r < 0 ? -1 : 1;
            x = sign * D * (2 - a); s = 0.92 - 0.10 * (a - 1); b = 0.80 - 0.18 * (a - 1); o = 2 - a;
          } else {
            x = 0;                s = 0.82;                b = 0.62;                o = 0;
          }
          node.style.transform = 'translateX(' + x + 'px) scale(' + s + ')';
          node.style.filter = 'brightness(' + b + ')';
          node.style.opacity = String(o);
          node.style.zIndex = String(Math.round(100 - Math.min(a, 2) * 20));
        }
        const idx = ((Math.round(centreRef.current) % N) + N) % N;
        setActiveIndex((prev) => (prev === idx ? prev : idx));
      }, [relOf, N]);

      const measure = useCallback(() => {
        const stage = stageRef.current;
        if (!stage) return;
        const V = stage.clientWidth;
        if (!V) return;            // stage not laid out yet ‚Äî wait for the ResizeObserver
        const W = Math.round((V - 30) * CARD_SCALE);
        const D = Math.round(V / 2 - 0.46 * W) - 16;   // the -16 insets the side cards from the screen edges so they don't collide with them
        const DRAG = Math.max(1, Math.round(V * 0.40));
        dimsRef.current = { V, W, D, DRAG };
        const slots = stage.querySelectorAll('.carousel-slot');
        slots.forEach((el) => { el.style.width = W + 'px'; el.style.marginLeft = (-W / 2) + 'px'; });
        layout();
        markReady();               // cards are positioned ‚Äî safe to reveal the stage
      }, [layout, markReady]);

      // measure on mount + whenever card count, stamp/reward state or the
      // measured club-card height changes (club card is variable height).
      useLayoutEffect(() => {
        const h = clubMeasureRef.current ? clubMeasureRef.current.offsetHeight : 0;
        if (h && h !== stageHeight) setStageHeight(h);
        measure();
      }, [N, stageHeight, displayStampCount, displayIsReward, measure]);

      // Safety net: never leave the stage hidden. If no measure has landed a
      // real width within 600ms (paranoia path), reveal anyway.
      useEffect(() => {
        const t = setTimeout(markReady, 600);
        return () => clearTimeout(t);
      }, [markReady]);

      // Tilt engine ‚Äî phone gyro drives the special-card finish + monogram.
      // Sets --tx/--ty (lean), --mb (monogram boost), --spot (highlight) + a
      // `tilting` class on the carousel stage; the .sf-* CSS reads them. No
      // gyro (desktop / iOS without motion permission) = the ambient shimmer.
      useEffect(() => {
        const stage = stageRef.current;
        if (!stage) return;
        let raf = 0, tx = 0, ty = 0, mtx = 0, mty = 0;
        const onOrient = (e) => {
          if (e.gamma == null && e.beta == null) return;
          const g = e.gamma || 0, b = (e.beta || 0) - 45;
          const nx = Math.max(-1, Math.min(1, g / 17));   // sensitive ‚Äî light + shine
          const ny = Math.max(-1, Math.min(1, b / 17));
          const mnx = Math.max(-1, Math.min(1, g / 30));  // monogram fade ‚Äî moderate range
          const mny = Math.max(-1, Math.min(1, b / 30));
          tx += (nx - tx) * 0.22;
          ty += (ny - ty) * 0.22;
          mtx += (mnx - mtx) * 0.22;
          mty += (mny - mty) * 0.22;
          if (raf) return;
          raf = requestAnimationFrame(() => {
            raf = 0;
            const mag = Math.min(1, Math.hypot(tx, ty));
            const mmag = Math.min(1, Math.hypot(mtx, mty));
            stage.style.setProperty('--tx', tx.toFixed(3));
            stage.style.setProperty('--ty', ty.toFixed(3));
            stage.style.setProperty('--mb', Math.max(0.25, 1 - 0.8 * mmag).toFixed(3));
            stage.style.setProperty('--spot', (0.12 + 0.55 * mag).toFixed(3));
            stage.classList.add('tilting');
          });
        };
        // iOS 13+ legally requires a user-gesture permission prompt before a
        // *web page* may read the gyro. JJ's call (2026-06-24): don't prompt at
        // all on the web ‚Äî iPhone leans on the ambient catch-light + sheen
        // instead (pure CSS; see the .sf sfAmbient animation, no permission
        // needed). The native App Store wrap can ask once, in-app, where users
        // expect it. Android / desktop need no prompt, so attach the gyro
        // listener there; the live tilt adds .tilting, which pauses the ambient
        // loop. Where requestPermission exists (iOS) we simply never attach ‚Äî
        // no prompt, no web gyro, the ambient shimmer carries the finish.
        const needsPerm = typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function';
        if (!needsPerm) window.addEventListener('deviceorientation', onOrient, true);
        return () => {
          window.removeEventListener('deviceorientation', onOrient, true);
          if (raf) cancelAnimationFrame(raf);
        };
      }, []);

      // ResizeObserver: track the club card's live height + viewport width
      useEffect(() => {
        const stage = stageRef.current;
        const club = clubMeasureRef.current;
        if (typeof ResizeObserver === 'undefined') {
          const onR = () => measure();
          window.addEventListener('resize', onR);
          return () => window.removeEventListener('resize', onR);
        }
        const ro = new ResizeObserver(() => {
          if (club) {
            const h = club.offsetHeight;
            if (h) setStageHeight((prev) => (prev === h ? prev : h));
          }
          measure();
        });
        if (stage) ro.observe(stage);
        if (club) ro.observe(club);
        return () => ro.disconnect();
      }, [measure]);

      const animateTo = useCallback((target) => {
        if (rafRef.current) cancelAnimationFrame(rafRef.current);
        const from = centreRef.current;
        const dur = 430;
        const t0 = performance.now();
        const ease = (t) => 1 - Math.pow(1 - t, 3);
        const step = (now) => {
          const t = Math.min(1, (now - t0) / dur);
          centreRef.current = from + (target - from) * ease(t);
          layout();
          if (t < 1) {
            rafRef.current = requestAnimationFrame(step);
          } else {
            rafRef.current = 0;
            // normalise centre into [0, N)
            centreRef.current = ((target % N) + N) % N;
            layout();
          }
        };
        rafRef.current = requestAnimationFrame(step);
      }, [layout, N]);

      // Pointer handlers (attached to the stage). idx = the slot pressed.
      const onPointerDown = useCallback((e, idx) => {
        const x = e.clientX != null ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
        const now = performance.now();
        if (idx === activeIndex) {
          if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = 0; }
          dragRef.current = { active: true, baseC: centreRef.current, pressedIdx: idx, startX: x, moved: 0, vx: 0, lastX: x, lastT: now };
        } else {
          dragRef.current = { active: false, baseC: centreRef.current, pressedIdx: idx, startX: x, moved: 0, vx: 0, lastX: x, lastT: now };
        }
      }, [activeIndex]);

      const onPointerMove = useCallback((e) => {
        const d = dragRef.current;
        if (d.pressedIdx == null) return;
        const x = e.clientX != null ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
        const dx = x - d.startX;
        d.moved = Math.max(d.moved, Math.abs(dx));
        if (d.active) {
          // Track pointer velocity (px/ms) so onPointerUp can carry a flick.
          // Smooth lightly so a single jittery frame doesn't dominate; ignore
          // zero-dt frames. Newest sample weighted 0.8.
          const now = performance.now();
          const dt = now - d.lastT;
          if (dt > 0) {
            const inst = (x - d.lastX) / dt;
            d.vx = d.vx === 0 ? inst : d.vx * 0.2 + inst * 0.8;
            d.lastX = x;
            d.lastT = now;
          }
          let c = d.baseC - dx / dimsRef.current.DRAG;
          if (c > d.baseC + 1) c = d.baseC + 1; else if (c < d.baseC - 1) c = d.baseC - 1;
          centreRef.current = c;
          layout();
        }
      }, [layout]);

      const onPointerUp = useCallback((e) => {
        const d = dragRef.current;
        if (d.pressedIdx == null) return;
        if (d.active) {
          // Flick momentum: convert pointer velocity (px/ms) into centre-units/ms
          // and project a short distance ahead, so a quick flick carries to the
          // next card even on a short drag. A slow release (vx ~ 0) projects ~0
          // and just snaps to nearest. Clamp travel to <= 2 cards from where the
          // drag began so a hard flick can't overshoot the stack.
          const dims = dimsRef.current;
          const centreVel = -d.vx / dims.DRAG;        // centre-units per ms
          const predicted = centreRef.current + centreVel * 120;
          let target = Math.round(predicted);
          const baseRound = Math.round(d.baseC);
          // one stroke advances at most one card in either direction
          if (target > baseRound + 1) target = baseRound + 1;
          else if (target < baseRound - 1) target = baseRound - 1;
          animateTo(target);
        } else if (d.moved < 10) {
          // tap on a peeking side card ‚Üí bring it to centre via the
          // nearest equivalent target that lands pressedIdx in the middle.
          const cur = centreRef.current;
          const base = d.pressedIdx;
          let best = base, bestDist = Math.abs(base - cur);
          for (let k = -1; k <= 1; k++) {
            const cand = base + k * N;
            const dist = Math.abs(cand - cur);
            if (dist < bestDist) { bestDist = dist; best = cand; }
          }
          animateTo(best);
        }
        dragRef.current = { active: false, baseC: centreRef.current, pressedIdx: null, startX: 0, moved: 0 };
      }, [animateTo]);

      // cleanup any in-flight animation on unmount
      useEffect(() => () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); }, []);

      // The centred special card (null when the club card is centred).
      const centredSpecial = activeIndex > 0 ? specialCards[activeIndex - 1] : null;
      const centredArmed = !!(centredSpecial && redeemingCard && redeemingCard.id === centredSpecial.id);
      const armCard = (c) => setRedeemingCard(c);
      const cancelArm = () => setRedeemingCard(null);
      const fmtActivate = (iso) => iso ? new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : '';

      return html`
        <div class="screen slide-up" ref=${screenRef}>
          <div class="ptr-indicator ${pulling ? 'active' : ''}"><div class="ptr-spinner"></div></div>
          <div style=${{ marginBottom: '8px' }}>
            <div class="t-hero">Home</div>
            <p class="t-body c-muted" style=${{ marginTop: '4px' }}>${displayIsReward ? html`<span class="c-wasabi" style=${{ fontWeight: 700 }}>Your next visit is on us!</span>` : displayStampCount === 0 ? "Collect soy sauce fish with every visit to Rolled!" : html`<span>${displayRemaining} stamp${displayRemaining !== 1 ? 's' : ''} to go</span>`}</p>
          </div>

          ${/* ‚ïê‚ïê‚ïê PHASE 7e ‚Äî WALLET-STYLE CARD CAROUSEL ‚ïê‚ïê‚ïê */null}
          ${/* One stage: club card (slot 0) + special faces. Motion is */null}
          ${/* driven imperatively by the engine above; React renders the */null}
          ${/* card nodes once and the engine sets each node's transform. */null}
          <div class="card-carousel">
            <div class="carousel-stage ${ready ? 'is-ready' : ''}" ref=${stageRef} style=${{ height: stageHeight ? stageHeight + 'px' : 'auto' }}
              onPointerMove=${onPointerMove} onPointerUp=${onPointerUp} onPointerCancel=${onPointerUp} onPointerLeave=${onPointerUp}>

              ${/* ‚îÄ‚îÄ Slot 0: the existing club card (unchanged markup) ‚îÄ‚îÄ */null}
              <div class="carousel-slot carousel-slot--club" ref=${(el) => { slotRefs.current[0] = el; }}
                style=${{ height: stageHeight ? stageHeight + 'px' : 'auto' }}
                onPointerDown=${(e) => onPointerDown(e, 0)}>
                <div ref=${clubMeasureRef} style=${{ position: 'relative' }}>
                  <div ref=${glowRef} class="tier-upgrade-glow"></div>
                  <div ref=${particlesRef} style=${{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', pointerEvents: 'none', zIndex: 20, overflow: 'visible' }}></div>
                  <div ref=${cardRef} class="club-card ${displayIsReward ? 'club-card--reward' : ''} ${cardFlipping ? 'card-flip-in' : ''}">
              ${displayIsReward ? html`<${Confetti} /><div class="card-reward-shine"></div>` : null}
              ${cardShining && !displayIsReward ? html`<div class="card-shine-once"></div>` : null}
              <${TierUpgradeWavesSVG} svgRef=${waveSvgRef} />

              ${/* ‚îÄ‚îÄ Card Header (70px zone) ‚îÄ‚îÄ */null}
              <div class="card-header card-header--${displayTierSlug}">
                ${displayTierSlug === 'standard' ? html`<${WaveLines} />` : null}
                ${displayHasTier ? html`<div class="card-header-scrim ${displayTierSlug === 'diamond' ? 'card-header-scrim--diamond' : ''}"></div>` : null}
                ${tierAnimPhase === 'reveal' ? html`<div class="tier-texture-reveal card-header--${tierAnimNewTier.current || tierSlug}" style=${{ position: 'absolute', top: 0, left: 0, right: 0, bottom: 0, zIndex: 0, borderRadius: 'inherit' }}><div class="card-header-scrim"></div></div>` : null}
                ${displayHasTier && tierAnimPhase !== 'reveal' ? html`<div class="card-header-shimmer card-header-shimmer--${displayTierSlug}"><div class="shim1"></div><div class="shim2"></div><div class="shim3"></div></div>` : null}
                <div class="card-header-content">
                  <div>
                    <span class="card-header-title">Rolled Club Card</span>
                    <span class="card-header-name">${firstName}</span>
                  </div>
                  ${displayHasTier ? html`<span class="card-tier-badge card-tier-badge--${displayTierSlug}">${displayTierName}</span>` : null}
                </div>
              </div>

              ${/* ‚îÄ‚îÄ Card Body (Nori stamp zone) ‚îÄ‚îÄ */null}
              <div class="card-body">
                <${PoolEffect} sparkOnly=${displayTierSlug === 'standard'} />
                <div class="stamp-grid" ref=${stampGridRef}>
                  ${stampSlots.map((s, i) => html`
                    <div class="stamp-slot ${s.state !== 'empty' ? 'stamp-filled' : ''} ${s.state === 'reward' ? 'stamp-reward-glow' : ''} ${s.state === 'bonus' ? 'stamp-bonus-glow' : ''} ${tierAnimPhase === 'buildup' ? 'stamp-wiggle' : tierAnimPhase === 'intense' ? 'stamp-wiggle-intense' : ''}" key=${i} style=${tierAnimPhase === 'newstamp' && i === 0 && s.state !== 'empty' ? { animation: 'stampPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both' } : s.state !== 'empty' ? { animationDelay: `${i * 0.06}s` } : {}}>
                      <${SoyFishStamp} state=${s.state === 'bonus' ? 'filled' : s.state === 'reward' ? 'filled' : s.state} />
                    </div>
                  `)}
                </div>
                <p style=${{ textAlign: 'center', fontSize: '12px', fontFamily: 'var(--fd)', color: 'var(--kewpie-dim)', marginTop: '2px', paddingBottom: '4px', position: 'relative', zIndex: 5 }}>${displayIsReward ? 'Card fully stamped. Claim your reward next visit' : 'Collect 8 stamps and unlock your reward, our shout!'}</p>
                    </div>
                  </div>
                </div>
              </div>

              ${/* ‚îÄ‚îÄ Slots 1..N: special placeholder faces ‚îÄ‚îÄ */null}
              ${specialCards.map((sc, i) => html`
                <div class="carousel-slot" key=${sc.id} ref=${(el) => { slotRefs.current[i + 1] = el; }}
                  style=${{ height: stageHeight ? stageHeight + 'px' : 'auto' }}
                  onPointerDown=${(e) => onPointerDown(e, i + 1)}>
                  <${SpecialCardFace} card=${sc} profile=${profile} />
                </div>
              `)}
            </div>
          </div>

          ${/* ‚îÄ‚îÄ Position dots (tap to centre) ‚îÄ‚îÄ */null}
          ${N > 1 ? html`
            <div class="carousel-dots">
              ${Array.from({ length: N }, (_, i) => html`
                <button class="carousel-dot ${i === activeIndex ? 'is-active' : ''}" key=${i}
                  aria-label=${'Go to card ' + (i + 1)} onClick=${() => animateTo(i)}></button>
              `)}
            </div>
          ` : null}

          ${/* ‚ïê‚ïê‚ïê CONTEXT AREA ‚Äî swaps with the centred card; one fixed ‚ïê‚ïê‚ïê */null}
          ${/* reserved height across every state so the nav never jumps. */null}
          <div class="home-context">
            ${activeIndex === 0 ? html`
              <div class="context-pane ${displayIsReward ? 'claim-flow' : ''}">
          ${/* ‚îÄ‚îÄ 8/8 = claim flow (mirrors special cards, wasabi via the claim-* fallbacks); collecting = Your-reward strip + compact progress + food + QR ‚îÄ‚îÄ */null}
          ${displayIsReward ? html`
              <div class="claim-head">
                <div class="claim-name">Club Card Completed!</div>
                <div class="claim-reward">${currentReward}</div>
              </div>
              ${!clubArmed ? html`
                <div class="claim-box claim-box--wave">
                  <${WaveLinesBox} />
                  <button class="claim-btn" onClick=${() => setClubArmed(true)}>Claim</button>
                </div>
              ` : html`
                <div class="claim-stage">
                  <div class="claim-ring"></div>
                  <div class="claim-box claim-box--armed">
                    <div class="claim-gleam"></div>
                    <${ClubRewardQR} loyaltyId=${loyaltyId} />
                  </div>
                  ${CLAIM_SPARKS.map((p, i) => html`<span class="claim-spark" key=${i} style=${{ '--dx': p[0] + 'px', '--dy': p[1] + 'px', animationDelay: (0.08 + i * 0.012) + 's' }}></span>`)}
                </div>
                <div class="claim-id-pill">${loyaltyId}</div>
                <p class="claim-caption">Show staff <b>before</b> payment to claim reward</p>
                <button class="claim-cancel" onClick=${() => setClubArmed(false)}>Cancel</button>
              `}
          ` : html`
            <div style=${{ textAlign: 'center', margin: '6px 0 2px' }}>
              <p style=${{ fontSize: '9.5px', letterSpacing: '0.8px', textTransform: 'uppercase', color: 'var(--wasabi)', margin: 0, opacity: 0.9 }}>Your reward</p>
              <p style=${{ fontFamily: 'var(--fd)', fontSize: '16px', color: 'var(--kewpie)', margin: '2px 0 0' }}>${currentReward}</p>
            </div>
            ${!isMaxTier ? html`
              <div class="tier-progress tier-progress--home" role="button" onClick=${() => onNavigate && onNavigate('rewards')} style=${{ marginTop: '8px', width: '100%', maxWidth: '348px', marginLeft: 'auto', marginRight: 'auto', cursor: 'pointer' }}>
                <div style=${{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '7px' }}>
                  <span style=${{ fontSize: '12.5px', fontWeight: 700, color: 'var(--kewpie)' }}>${tierCardsLeft} card${tierCardsLeft !== 1 ? 's' : ''} to ${nextTier.name}</span>
                  <span style=${{ fontSize: '10.5px', fontWeight: 600, color: 'var(--wasabi)', display: 'flex', alignItems: 'center', gap: '3px' }}>View rewards <span style=${{ fontSize: '13px', lineHeight: 1 }}>‚Ä∫</span></span>
                </div>
                <div style=${{ display: 'flex', alignItems: 'center', gap: '9px' }}>
                  <div class="tier-progress-bar" style=${{ flex: 1 }}><div class="tier-progress-fill" style=${{ width: `${Math.max(6, Math.min(100, tierProgress))}%`, background: nextTierColor }}></div></div>
                  <${TierGoalRoo} color=${nextTierColor} />
                </div>
              </div>
            ` : null}
            <p style=${{ textAlign: 'center', fontSize: '10px', color: 'var(--kewpie-muted)', marginTop: '8px', marginBottom: '2px', fontFamily: 'var(--fb)' }}>*food purchase required per visit</p>
            ${showWalletPrompt ? html`<${WalletButtons} variant="mini" showToast=${showToast} onDismiss=${dismissWallet} />` : null}
            <button class="scan-cta" onClick=${() => setShowScanQR(true)}>
              <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3M21 14v.01M14 21h.01M17 21h.01M21 21v.01M21 17v.01"/></svg>
              Scan to collect
            </button>
          `}
              </div>
            ` : centredSpecial ? html`
              ${/* ‚îÄ‚îÄ Special-card branch: inline claim flow ‚îÄ‚îÄ */null}
              <div class="context-pane claim-flow" style=${{ '--accent': specialAccent(centredSpecial.card_type), '--accent-glow': accentGlow(specialAccent(centredSpecial.card_type), 0.5), '--box-frame': specialFinish(centredSpecial.card_type), '--claim-ink': (centredSpecial.card_type === 'staff' || centredSpecial.card_type === 'influencer') ? 'var(--kewpie)' : 'var(--nori)' }}>
                <div class="claim-head">
                  <div class="claim-name">${centredSpecial.display_name}</div>
                  ${centredSpecial.reward_description ? html`<div class="claim-reward">${centredSpecial.reward_description}</div>` : null}
                </div>

                ${centredSpecial.status !== 'available' ? html`
                  ${/* Locked ‚Äî same box footprint, padlock + reason ‚îÄ‚îÄ */null}
                  <div class="claim-box">
                    <div class="claim-locked">
                      <svg viewBox="0 0 24 24" fill="none" stroke=${specialAccent(centredSpecial.card_type)} stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                      <div class="claim-locked-text">${centredSpecial.status === 'pending_activation' ? 'Available from ' + fmtActivate(centredSpecial.activates_at) : (centredSpecial.reason || 'Not available yet')}</div>
                    </div>
                  </div>
                ` : !centredArmed ? html`
                  ${/* Claimable ‚Äî wave-pattern box + Claim button ‚îÄ‚îÄ */null}
                  <div class="claim-box claim-box--wave">
                    <${WaveLinesBox} />
                    <button class="claim-btn" onClick=${() => armCard(centredSpecial)}>Claim</button>
                  </div>

ectification</strong> \u2014 request corrections to inaccurate data</li><li><strong>Erasure</strong> \u2014 request deletion of your account and all data</li><li><strong>Portability</strong> \u2014 receive your data in a standard format</li><li><strong>Withdraw consent</strong> \u2014 stop using the service at any time</li></ul><p>Contact us at <strong>gday@eatrolled.com</strong>. We will respond within 30 days.</p><h2>How long we keep it</h2><p>We retain data while your account is active. Inactive accounts (24 months) will be flagged for review. Account deletion removes all personal data within 30 days.</p><h2>Cookies</h2><p>The app uses a secure auth token cookie. We do not use third-party tracking cookies.</p><h2>Children</h2><p>Not directed at children under 16. We do not knowingly collect data from anyone under 16.</p><h2>Changes</h2><p>We may update this policy. Significant changes notified via app or email.</p><h2>Contact</h2><p><strong>Rolled Aussie-Style Sushi</strong><br/>Email: gday@eatrolled.com</p></div></div>`;

    // Build the same shape GET /me/tiers returns, from already-loaded profile
    // data. Resilient fallback so the Rewards tab renders even if that endpoint
    // is unavailable (backend not yet deployed / offline).
    function buildLadderFromProfile(profile) {
      const completed = parseInt(profile && profile.completed_cards, 10) || 0;
      const raw = ((profile && profile.loyalty_tier) || 'none').toLowerCase();
      const currentName = raw === 'none' ? 'standard' : raw;
      let currentIdx = REWARD_LADDER.findIndex(t => t.name === currentName);
      if (currentIdx === -1) {
        currentIdx = 0;
        for (let i = 0; i < REWARD_LADDER.length; i++) { if (completed >= REWARD_LADDER[i].threshold) currentIdx = i; }
      }
      const tiers = REWARD_LADDER.map((t, i) => ({ ...t, status: i < currentIdx ? 'done' : i === currentIdx ? 'current' : 'locked' }));
      const nextRow = REWARD_LADDER.find(t => t.threshold > completed) || null;
      return {
        completed_cards: completed,
        current_tier: { name: tiers[currentIdx].name, reward_description: tiers[currentIdx].reward_description },
        next_tier: nextRow ? { name: nextRow.name, threshold: nextRow.threshold, cards_to_next: nextRow.threshold - completed } : null,
        tiers,
      };
    }

        api('/api/v1/customers/me/tiers')
          .then(res => apply(res && Array.isArray(res.tiers) ? res : buildLadderFromProfile(profile)))
          .catch(() => apply(buildLadderFromProfile(profile)));
        return () => { alive = false; };

                <div class="rwd-hero-lbl">Your current tier reward</div>
                <div class="rwd-hero-reward">${current.reward_description}</div>
              </div>
            </div>

          ${/* ‚îÄ‚îÄ Tier Rewards ‚Äî tappable blocks, real tier textures ‚îÄ‚îÄ */null}

            ${data.tiers.map(t => {

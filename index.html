<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Rolled — Animation Lab</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="https://use.typekit.net/htl2spk.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: only dark;
      --nori: #00392c; --nori-light: #004d3b; --nori-dark: #002a20; --nori-deep: #001f17;
      --wasabi: #d4fb6f; --wasabi-glow: rgba(212,251,111,0.35); --wasabi-dim: rgba(212,251,111,0.12);
      --kewpie: #fefaf0; --kewpie-dim: rgba(254,250,240,0.55); --kewpie-muted: rgba(254,250,240,0.28); --kewpie-faint: rgba(254,250,240,0.10);
      --gold: #D4A017; --diamond: #B9F2FF;
      --fd: 'gelica', Georgia, serif;
      --fb: 'Manrope', system-ui, sans-serif;
      --r-xl: 20px; --r-lg: 16px; --r-md: 12px; --r-sm: 8px;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #00392c; overflow: hidden; }
    body { font-family: var(--fb); color: var(--kewpie); }
    #root { height: 100%; }

    /* ══════ LAB SHELL ══════ */
    .lab { position: fixed; inset: 0; display: flex; flex-direction: column; }
    .lab-stage { flex: 1; position: relative; overflow: hidden; background:
      radial-gradient(120% 80% at 50% 12%, #05463731 0%, transparent 60%), var(--nori); }
    .lab-hint { position: absolute; top: 0; left: 0; right: 0; padding: 20px 22px 10px; text-align: center; pointer-events: none; }
    .lab-hint h1 { font-family: var(--fd); font-size: 20px; font-weight: 700; color: var(--kewpie); }
    .lab-hint p { font-size: 12.5px; color: var(--kewpie-dim); margin-top: 4px; }
    .lab-panel { background: var(--nori-deep); border-top: 1px solid var(--kewpie-faint); padding: 14px 16px calc(16px + env(safe-area-inset-bottom, 0px)); }
    .lab-row { display: flex; align-items: center; gap: 8px; }
    .lab-row + .lab-row { margin-top: 12px; }
    .lab-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--kewpie-muted); flex: none; width: 56px; }
    .lab-title { font-family: var(--fd); font-size: 15px; font-weight: 700; color: var(--kewpie); flex: 1; }
    .lab-tag { font-size: 9.5px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; color: var(--nori); background: var(--wasabi); border-radius: 20px; padding: 3px 9px; }
    .lab-tag--next { background: transparent; color: var(--kewpie-muted); border: 1px solid var(--kewpie-faint); }
    .chip { flex: 1; text-align: center; font-size: 12px; font-weight: 700; padding: 8px 4px; border-radius: 10px; background: rgba(254,250,240,0.06); color: var(--kewpie-dim); border: 1px solid transparent; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .chip.is-on { background: var(--wasabi); color: var(--nori); }
    .btn { flex: 1; text-align: center; font-size: 14px; font-weight: 700; padding: 13px; border-radius: 12px; cursor: pointer; border: none; -webkit-tap-highlight-color: transparent; font-family: var(--fb); }
    .btn-before { background: rgba(254,250,240,0.08); color: var(--kewpie); border: 1px solid var(--kewpie-faint); }
    .btn-after { background: var(--wasabi); color: var(--nori); }
    .btn-after:active, .btn-before:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.35; cursor: default; }
    .lab-sub { display: flex; gap: 8px; margin-top: 10px; }
    .mini { flex: 1; display: flex; align-items: center; justify-content: space-between; gap: 8px; background: rgba(254,250,240,0.04); border: 1px solid var(--kewpie-faint); border-radius: 10px; padding: 9px 12px; }
    .mini span { font-family: var(--fd); font-size: 12.5px; color: var(--kewpie-dim); }

    /* ══════ SHARED OVERLAY ══════ */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes overlayFadeOut { from { opacity: 1; } to { opacity: 0; } }
    .celebrate-overlay {
      position: absolute; inset: 0; z-index: 200;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(0, 57, 44, 0.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      opacity: 0; animation: fadeIn 0.2s ease forwards; padding: 32px 24px; text-align: center; overflow: hidden;
    }
    .overlay-fading { animation: overlayFadeOut 0.35s var(--ease) forwards !important; pointer-events: none; }
    .celebrate-overlay-card { display: flex; flex-direction: column; align-items: center; text-align: center; z-index: 52; position: relative; }

    /* ══════ BEFORE (verbatim from the live app) ══════ */
    @keyframes confettiFromLeft { 0% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateX(55vw) translateY(25vh) rotate(540deg); opacity: 0; } }
    @keyframes confettiFromRight { 0% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateX(-55vw) translateY(25vh) rotate(-540deg); opacity: 0; } }
    @keyframes popperIn { 0% { opacity: 0; transform: scale(0.3) rotate(-20deg); } 70% { opacity: 1; transform: scale(1.15) rotate(5deg); } 100% { opacity: 1; transform: scale(1) rotate(0deg); } }
    @keyframes popperBounce { 0%, 100% { transform: translateY(0) rotate(0deg); } 30% { transform: translateY(-8px) rotate(-3deg); } 60% { transform: translateY(-4px) rotate(2deg); } }
    @keyframes coneShake { 0% { transform: rotate(0); } 25% { transform: rotate(-8deg); } 50% { transform: rotate(6deg); } 75% { transform: rotate(-3deg); } 100% { transform: rotate(0); } }
    @keyframes starPop { 0% { opacity: 0; transform: scale(0); } 60% { opacity: 1; transform: scale(1.3); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes streamerIn { 0% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes glowPulse { 0% { opacity: 0; transform: scale(0.5); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.5; transform: scale(1); } }
    @keyframes titlePop { 0% { opacity: 0; transform: scale(0.5); } 70% { opacity: 1; transform: scale(1.08); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes celebFadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes celebSlideIn { to { opacity: 1; transform: translateY(0); } }
    .celebrate-title { font-family: var(--fd); font-size: 34px; font-weight: 700; color: var(--wasabi); line-height: 1.1; }
    .celebrate-title--hero { font-size: 48px; line-height: 1; margin-top: 6px; opacity: 0; transform: scale(0.5); animation: titlePop 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.25s forwards; }
    .celebrate-subtitle { font-family: var(--fb); font-size: 14px; font-weight: 500; color: var(--kewpie-dim); letter-spacing: 0.5px; margin-top: 6px; opacity: 0; animation: celebFadeUp 0.4s ease 0.6s forwards; }
    .celebrate-dismiss { margin-top: 20px; font-family: var(--fb); font-size: 14px; font-weight: 600; color: var(--kewpie-dim); background: none; border: 1.5px solid rgba(254,250,240,0.25); border-radius: 12px; padding: 12px 32px; cursor: pointer; }
    .popper-wrap { width: 80px; height: 80px; opacity: 0; animation: popperIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.1s forwards, popperBounce 1.5s ease-in-out 0.6s 2; }
    .popper-cone { animation: coneShake 0.4s ease-out 0.3s both; transform-origin: 880px 650px; }
    .popper-star { opacity: 0; animation: starPop 0.6s ease-out forwards; transform-origin: 1050px 480px; }
    .popper-streamer { opacity: 0; animation: streamerIn 0.6s ease-out forwards; }
    .title-glow { position: absolute; top: -60px; width: 180px; height: 180px; background: radial-gradient(circle, rgba(212,251,111,0.12) 0%, transparent 70%); border-radius: 50%; opacity: 0; animation: glowPulse 1.8s ease 0.2s forwards; z-index: -1; }
    .reward-section { display: flex; flex-direction: column; align-items: center; text-align: center; opacity: 0; transform: translateY(16px); animation: celebSlideIn 0.5s cubic-bezier(0.22,1,0.36,1) 1.8s forwards; }
    .reward-badge { background: var(--wasabi); color: var(--nori); border-radius: 14px; padding: 16px 28px; text-align: center; margin-top: 24px; }
    .reward-badge-title { font-family: var(--fd); font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
    .reward-message { font-family: var(--fb); font-size: 13px; font-weight: 400; color: var(--kewpie-dim); margin-top: 14px; max-width: 270px; line-height: 1.5; text-align: center; }
    .confetti-wrap { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 51; }
    .confetti-piece { position: absolute; }

    /* ══════ AFTER — "Rolled Reward" motion language ══════ */
    .rc-overlay {
      position: absolute; inset: 0; z-index: 200; overflow: hidden;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 32px 24px; text-align: center;
      background: radial-gradient(115% 75% at 50% 40%, #0a5442 0%, #00392c 52%, #002018 100%);
      opacity: 0; animation: fadeIn 0.25s ease forwards;
    }
    .rc-herowrap { position: relative; width: 104px; height: 104px; display: flex; align-items: center; justify-content: center; }
    .rc-glow { position: absolute; top: 50%; left: 50%; width: 360px; height: 360px; margin: -180px 0 0 -180px; border-radius: 50%; opacity: 0;
      background: radial-gradient(circle, rgba(212,251,111,0.30) 0%, rgba(212,251,111,0.07) 42%, transparent 68%);
      animation: rcGlow 1.3s ease-out 0.08s forwards; pointer-events: none; }
    @keyframes rcGlow { 0% { opacity: 0; transform: scale(0.35); } 45% { opacity: 1; transform: scale(1.06); } 100% { opacity: 0.72; transform: scale(1); } }
    .rc-ring { position: absolute; top: 50%; left: 50%; width: 104px; height: 104px; margin: -52px 0 0 -52px; border: 2.5px solid rgba(212,251,111,0.75); border-radius: 50%; opacity: 0; animation: rcRing 0.75s ease-out 0.2s forwards; pointer-events: none; }
    .rc-ring2 { border-color: rgba(254,250,240,0.35); animation-delay: 0.34s; }
    @keyframes rcRing { 0% { opacity: 0.85; transform: scale(0.5); } 100% { opacity: 0; transform: scale(3.4); } }
    .rc-hero { width: 100%; height: 100%; opacity: 0; transform: scale(0.3); animation: rcHeroPop 0.55s cubic-bezier(0.34,1.56,0.64,1) 0.1s forwards; filter: drop-shadow(0 8px 22px rgba(212,251,111,0.4)); position: relative; z-index: 3; }
    @keyframes rcHeroPop { 0% { opacity: 0; transform: scale(0.3) rotate(-12deg); } 60% { opacity: 1; transform: scale(1.12) rotate(4deg); } 100% { opacity: 1; transform: scale(1) rotate(0); } }
    .rc-fish { position: absolute; top: 50%; left: 50%; opacity: 0; pointer-events: none; will-change: transform, opacity; z-index: 2; }
    @keyframes rcFishFly {
      0% { opacity: 0; transform: translate(-50%,-50%) scale(0.2) rotate(0deg); }
      22% { opacity: 1; }
      100% { opacity: 0; transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(var(--sc)) rotate(var(--rot)); }
    }
    .rc-title { font-family: var(--fd); font-size: 50px; line-height: 1; font-weight: 700; color: var(--wasabi); margin-top: 16px; opacity: 0; transform: scale(0.5); animation: rcTitle 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.5s forwards; position: relative; z-index: 3; text-shadow: 0 2px 26px rgba(212,251,111,0.28); }
    @keyframes rcTitle { 0% { opacity: 0; transform: scale(0.5); } 70% { opacity: 1; transform: scale(1.06); } 100% { opacity: 1; transform: scale(1); } }
    .rc-sub { font-family: var(--fb); font-size: 15px; font-weight: 500; color: var(--kewpie-dim); margin-top: 9px; opacity: 0; animation: rcUp 0.4s ease 0.82s forwards; position: relative; z-index: 3; }
    .rc-reward { margin-top: 22px; opacity: 0; transform: translateY(14px); animation: rcUp 0.5s var(--ease) 1.08s forwards; position: relative; z-index: 3; display: flex; flex-direction: column; align-items: center; }
    .rc-reward-eyebrow { font-family: var(--fb); font-size: 10.5px; font-weight: 700; letter-spacing: 1.6px; text-transform: uppercase; color: var(--kewpie-muted); margin-bottom: 9px; }
    .rc-reward-badge { position: relative; overflow: hidden; background: var(--wasabi); color: var(--nori); border-radius: 16px; padding: 15px 30px; font-family: var(--fd); font-size: 22px; font-weight: 700; box-shadow: 0 12px 34px rgba(212,251,111,0.26); }
    .rc-reward-badge::after { content: ''; position: absolute; top: -20%; left: -70%; width: 45%; height: 140%; background: linear-gradient(100deg, transparent, rgba(255,255,255,0.9), transparent); transform: skewX(-16deg); animation: rcShine 1.0s ease 1.55s; }
    @keyframes rcShine { 0% { left: -70%; } 100% { left: 150%; } }
    .rc-msg { font-family: var(--fb); font-size: 13px; color: var(--kewpie-dim); margin-top: 15px; max-width: 285px; line-height: 1.55; opacity: 0; animation: rcUp 0.4s ease 1.42s forwards; position: relative; z-index: 3; }
    .rc-btn { margin-top: 22px; font-family: var(--fb); font-size: 14px; font-weight: 700; color: var(--kewpie); background: none; border: 1.5px solid rgba(254,250,240,0.28); border-radius: 12px; padding: 12px 34px; cursor: pointer; opacity: 0; animation: rcUp 0.4s ease 1.6s forwards; position: relative; z-index: 3; }
    .rc-btn:active { transform: scale(0.97); background: rgba(254,250,240,0.05); }
    @keyframes rcUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import React, { useState, useEffect, useRef, useMemo } from 'https://esm.sh/react@18.2.0';
    import htm from 'https://esm.sh/htm@3.1.1';
    const html = htm.bind(React.createElement);

    // ── Soy-fish (verbatim paths from the app) ──
    const FISH_BODY = "M1.48,361.63l40.2-100.4c2-5,2-10.5,0-15.4L1.58,146.73c-1.6-3.9-2-8.1-1-12.1,4.8-20.7,28.8-32.2,48.4-20.9l125.35,72.39c19.47-34.17,53.19-63.84,96.49-85.97-1.01-5.63-3.47-28.92,19.37-50.62C316.48,24.63,369.88-.97,422.58.03c50.16.95,95.79,57.52,100.07,62.98,96.49,13.93,175.55,57.91,212.71,116.05.27-.01.55-.02.83-.02h65.4c12.26,0,22.2,9.94,22.2,22.2v105.6c0,12.26-9.94,22.2-22.2,22.2h-65.4c-.28,0-.55-.01-.83-.02-44.51,69.63-149.13,118.96-271.82,120.67-37.11,25.13-63.59,35.6-89.66,30.95-21.85-3.96-20.11-30.01-18.03-42.21-83.81-19.39-150.5-62.2-181.42-116.3l-125.55,72.51c-19.6,11.3-43.6-.2-48.4-20.9-.9-4-.5-8.2,1-12.1ZM629.28,255.53c18.94,0,34.3-15.36,34.3-34.3s-15.36-34.3-34.3-34.3-34.3,15.36-34.3,34.3,15.36,34.3,34.3,34.3ZM207.14,303.22c32.45,69.67,132.02,120.41,249.83,120.41,35.29,0,68.93-4.56,99.64-12.81-14.3-25.86-41.5-84.15-39.64-162.99l-.1.1c1.67-72.12,26.77-125.02,41.16-150.31-31.08-8.49-65.23-13.19-101.06-13.19-117.92,0-217.56,50.82-249.92,120.6-7.2,15.52-11.08,31.96-11.08,49s3.91,33.62,11.17,49.19Z";
    const FISH_EYE = { cx: 629.28, cy: 221.23, r: 34.3 };
    const FISH_SCALES = ["M473.58,345.33c3.6,3.4,3.9,9,.6,12.7-.2.2-1.4,2-1.4,5.2s1.2,5,1.4,5.2c3.3,3.7,3,9.3-.6,12.7-3.7,3.4-9.4,3.2-12.8-.5-1-1.1-6.1-7.2-6.1-17.4s5.1-16.3,6.1-17.4c3.4-3.7,9.1-3.9,12.8-.5Z","M427.88,345.33c3.6,3.4,3.9,9,.6,12.7-.2.2-1.4,2-1.4,5.2s1.2,5,1.4,5.2c3.3,3.7,3,9.3-.6,12.7-3.7,3.4-9.4,3.2-12.8-.5-1.1-1.1-6.2-7.2-6.2-17.4s5.2-16.3,6.2-17.4c3.4-3.7,9.1-3.9,12.8-.5Z","M382.18,345.33c3.6,3.4,3.9,9,.6,12.7-.2.2-1.4,2-1.4,5.2s1.2,5,1.4,5.2c3.3,3.7,3,9.3-.6,12.7-3.7,3.4-9.4,3.2-12.8-.5-1.1-1.1-6.2-7.2-6.2-17.4s5.2-16.3,6.2-17.4c3.4-3.7,9.1-3.9,12.8-.5Z","M473.58,236.13c3.6,3.4,3.9,9,.6,12.7-.2.2-1.4,2-1.4,5.2s1.2,5,1.4,5.2c3.3,3.7,3,9.3-.6,12.7-3.7,3.4-9.4,3.2-12.8-.5-1-1.1-6.1-7.2-6.1-17.4s5.1-16.3,6.1-17.4c3.4-3.7,9.1-3.9,12.8-.5Z","M427.88,236.13c3.6,3.4,3.9,9,.6,12.7-.2.2-1.4,2-1.4,5.2s1.2,5,1.4,5.2c3.3,3.7,3,9.3-.6,12.7-3.7,3.4-9.4,3.2-12.8-.5-1.1-1.1-6.2-7.2-6.2-17.4s5.2-16.3,6.2-17.4c3.4-3.7,9.1-3.9,12.8-.5Z","M382.18,236.13c3.6,3.4,3.9,9,.6,12.7-.2.2-1.4,2-1.4,5.2s1.2,5,1.4,5.2c3.3,3.7,3,9.3-.6,12.7-3.7,3.4-9.4,3.2-12.8-.5-1.1-1.1-6.2-7.2-6.2-17.4s5.2-16.3,6.2-17.4c3.4-3.7,9.1-3.9,12.8-.5Z"];
    function SoyFish() {
      return html`<svg viewBox="0 0 823.78 481.7" xmlns="http://www.w3.org/2000/svg" style=${{ display:'block', width:'100%', height:'100%' }}>
        <circle cx=${FISH_EYE.cx} cy=${FISH_EYE.cy} r=${FISH_EYE.r} fill="#00392c" />
        <path d=${FISH_BODY} fill="#d4fb6f" />
        <g>${FISH_SCALES.map((d, i) => html`<path key=${i} d=${d} fill="#d4fb6f" />`)}</g>
      </svg>`;
    }

    const CONFETTI_COLORS = ['#d4fb6f', '#fefaf0', '#D4A017', '#4ade80', '#B9F2FF'];
    const REWARD_LADDER = { standard: '2 Free Rolls', silver: '2 Free Rolls + Any Dip', gold: '2 Free Rolls + Aussie Snack', platinum: '3 Free Rolls + Any Dip', diamond: '4 Free Rolls or 3 Free Rolls + Drink' };
    const TIERS = ['standard','silver','gold','platinum','diamond'];
    const FIRST_NAME = 'JJ';

    // ═══════════ BEFORE (current live app, reproduced faithfully) ═══════════
    function CelebrationConfetti() {
      const wrapRef = useRef(null);
      const pieces = useMemo(() => Array.from({ length: 60 }, (_, i) => { const fromLeft = i % 2 === 0; const size = 6 + ((i*53)%100)/100 * 10; return { fromLeft, top: (15 + ((i*37)%100)/100 * 55) + '%', bg: CONFETTI_COLORS[i % CONFETTI_COLORS.length], delay: (((i*29)%100)/100 * 0.4) + 's', duration: (1 + ((i*17)%100)/100 * 1.2) + 's', size: size + 'px', radius: (i%2 ? '50%' : '2px') }; }), []);
      useEffect(() => { const t = setTimeout(() => { if (wrapRef.current) { wrapRef.current.style.transition = 'opacity 0.4s'; wrapRef.current.style.opacity = '0'; } }, 1600); return () => clearTimeout(t); }, []);
      return html`<div ref=${wrapRef} class="confetti-wrap">${pieces.map((p, i) => html`<div key=${i} class="confetti-piece" style=${{ [p.fromLeft ? 'left' : 'right']: '-10px', top: p.top, width: p.size, height: p.size, background: p.bg, borderRadius: p.radius, animation: (p.fromLeft ? 'confettiFromLeft ' : 'confettiFromRight ') + p.duration + ' cubic-bezier(0.25,0.46,0.45,0.94) ' + p.delay + ' forwards' }} />`)}</div>`;
    }
    function BeforeCelebration({ onClose }) {
      const [fading, setFading] = useState(false);
      const close = () => { setFading(true); setTimeout(onClose, 350); };
      return html`<div class="celebrate-overlay ${fading ? 'overlay-fading' : ''}">
        <${CelebrationConfetti} />
        <div class="celebrate-overlay-card">
          <div class="title-glow"></div>
          <div class="popper-wrap">
            <svg viewBox="700 340 520 400" xmlns="http://www.w3.org/2000/svg" style=${{ width:'100%',height:'100%',overflow:'visible' }}>

    // ═══════════ AFTER — new "Rolled Reward" language ═══════════
    function AfterCelebration({ tier, onClose }) {
      const [fading, setFading] = useState(false);
      const close = () => { setFading(true); setTimeout(onClose, 350); };
      const reward = REWARD_LADDER[tier] || REWARD_LADDER.standard;
      // School of soy-fish burst — deterministic by index (no RNG), fanned upward
      const fish = useMemo(() => Array.from({ length: 12 }, (_, i) => {
        const ang = (-Math.PI/2) + ((i - 5.5) / 11) * (Math.PI * 1.65) + ((i*29)%7 - 3) * 0.05;
        const dist = 128 + ((i*47)%95);
        return {
          tx: Math.cos(ang) * dist,
          ty: Math.sin(ang) * dist - 14,
          sc: 0.55 + ((i*31)%55)/100,
          rot: ((i*53)%90) - 45,
          size: 20 + ((i*23)%16),
          delay: 0.16 + (i%6) * 0.035,
          dur: 0.72 + ((i*19)%42)/100
        };
      }), []);
      return html`<div class="rc-overlay ${fading ? 'overlay-fading' : ''}">
        <div class="rc-herowrap">
          <div class="rc-glow"></div>
          <div class="rc-ring"></div>
          <div class="rc-ring rc-ring2"></div>
          ${fish.map((f, i) => html`<div key=${i} class="rc-fish" style=${{ width: f.size+'px', height: (f.size*0.6)+'px', '--tx': f.tx+'px', '--ty': f.ty+'px', '--sc': f.sc, '--rot': f.rot+'deg', animation: 'rcFishFly ' + f.dur + 's cubic-bezier(0.22,1,0.36,1) ' + f.delay + 's forwards' }}><${SoyFish} /></div>`)}
          <div class="rc-hero"><${SoyFish} /></div>
        </div>
        <div class="rc-title">You Beauty!</div>
        <div class="rc-sub">That's a full card, ${FIRST_NAME} — 8 out of 8.</div>
        <div class="rc-reward">
          <div class="rc-reward-eyebrow">Your next visit</div>
          <div class="rc-reward-badge">${reward}</div>
        </div>
        <div class="rc-msg">Flash your card to the crew next time you're in — it's on us. 🐟</div>
        <button class="rc-btn" onClick=${close}>Sweet as, let's go!</button>
      </div>`;
    }

    // ═══════════ LAB SHELL ═══════════
    function App() {
      const [tier, setTier] = useState('standard');
      const [active, setActive] = useState(null);
      const [run, setRun] = useState(0);
      const play = (kind) => { setRun(r => r + 1); setActive({ kind, run: run + 1 }); };
      const close = () => setActive(null);
      return html`<div class="lab">
        <div class="lab-stage">
          <div class="lab-hint">
            <h1>Animation Lab</h1>
            <p>8/8 celebration — tap Before / After to compare</p>
          </div>
          ${active && active.kind === 'before' ? html`<${BeforeCelebration} key=${'b'+active.run} onClose=${close} />` : null}
          ${active && active.kind === 'after' ? html`<${AfterCelebration} key=${'a'+active.run} tier=${tier} onClose=${close} />` : null}
        </div>
        <div class="lab-panel">
          <div class="lab-row">
            <div class="lab-title">1 · 8/8 "You Beauty!"</div>
            <div class="lab-tag">Working on</div>
          </div>
          <div class="lab-row">
            <button class="btn btn-before" onClick=${() => play('before')}>▶ Before</button>
            <button class="btn btn-after" onClick=${() => play('after')}>▶ After</button>
          </div>
          <div class="lab-row">
            <div class="lab-label">Tier</div>
            ${TIERS.map(t => html`<div key=${t} class="chip ${tier===t?'is-on':''}" onClick=${() => setTier(t)}>${t.charAt(0).toUpperCase()+t.slice(1)}</div>`)}
          </div>
          <div class="lab-sub">
            <div class="mini"><span>2 · Card Redeemed</span><div class="lab-tag lab-tag--next">Next</div></div>
            <div class="mini"><span>3 · Tier-up</span><div class="lab-tag lab-tag--next">Next</div></div>
          </div>
        </div>
      </div>`;
    }
    createRoot(document.getElementById('root')).render(html`<${App} />`);
  </script>

            <div style=${{ display: 'flex', alignItems: 'center', gap: '9px' }}>
              <${RooIcon} color="var(--wasabi)" size=${22} />
              <span class="rwd-legends-title">Rolled Legends Card</span>
            </div>
            <div class="rwd-legends-desc">Invite-only access to <b>exclusive rewards</b> including<br/>early drops, surprise gifts, and limited-edition items.</div>
            <div class="rwd-legends-howto">How to unlock</div>
            <div class="rwd-legends-tag">We find our Legends in the wild. <b>Tag us</b> in your content and you could become a Legend!</div>
            <div style=${{ marginTop: '12px', display: 'flex', alignItems: 'center', gap: '10px', flexWrap: 'wrap' }}>
              <a class="rwd-tagchip" href="https://instagram.com/eatrolled" target="_blank" rel="noopener">@eatrolled</a>
              <span class="rwd-social">
                <a href="https://instagram.com/eatrolled" target="_blank" rel="noopener" aria-label="Rolled on Instagram"><${IconInstagram} /></a>
                <a href="https://www.tiktok.com/@eatrolled" target="_blank" rel="noopener" aria-label="Rolled on TikTok"><${IconTikTok} /></a>
              </span>
            </div>
          </div>
        </div>`;
    }

    // ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
    // MAIN APP
    // ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
    function App() {
      const [authState, setAuthState] = useState('loading');
      const [tab, setTab] = useState('home');
      const [profile, setProfile] = useState(null);
      const [card, setCard] = useState(null);
      const [stamps, setStamps] = useState([]);
      const [showPrivacy, setShowPrivacy] = useState(false);
      const [resetToken, setResetToken] = useState(null);
      const [signupSource, setSignupSource] = useState(null);
      const [marketingCopy, setMarketingCopy] = useState(MARKETING_COPY_FALLBACK);
      const { show: showToast, ToastEl } = useToast();
      const openPrivacy = useCallback(() => setShowPrivacy(true), []);

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const verify = params.get('verify'); const reset = params.get('reset'); const source = params.get('source');
        if (source) setSignupSource(source);
        // Wave 10 ‚Äî fetch marketing copy in parallel with auth; merge over fallbacks.
        // Public endpoint, no auth required. Failures leave fallbacks in place.
        api('/api/v1/marketing-copy').then(res => { if (res && res.copy) setMarketingCopy({ ...MARKETING_COPY_FALLBACK, ...res.copy }); }).catch(() => {});
        if (verify) { api(`/api/v1/auth/verify-email/${verify}`).then(() => { showToast('Email verified! You can now sign in.', 'success'); window.history.replaceState({}, '', '/'); setAuthState('login'); }).catch(err => { showToast(err.message || 'Verification failed', 'error'); window.history.replaceState({}, '', '/'); setAuthState('login'); }); }
        else if (reset) { setResetToken(reset); setAuthState('reset'); window.history.replaceState({}, '', '/'); }
        else { checkAuth(source ? 'signup' : 'login'); }
      }, []);

      const checkAuth = async (noAuthFallback = 'login') => { const token = getToken(); if (!token) { /* iOS PWAs drop the in-memory token on suspend + don't reliably persist script cookies across launches, so a returning customer can arrive with no access token while their HTTP-only refresh cookie is still valid. Try a silent refresh before bouncing them to login. */ const refreshed = await tryRefresh(); if (!refreshed) { setAuthState(noAuthFallback); return; } } try { await loadUserData(); setAuthState('verified'); } catch (err) { /* Only a genuine auth failure (401, after refresh already retried) signs the user out. A rate-limit (429), network blip or 5xx must NOT clear the session ‚Äî keep the token + show the app; the next poll/refresh recovers the data. */ if (err && err.status === 401) { clearToken(); setAuthState(noAuthFallback); } else { setAuthState('verified'); } } };

      const loadUserData = useCallback(async () => {
        let profileData = null;
        let cardData = null;
        let stampsData = [];
        try { const profileRes = await api('/api/v1/customers/me'); profileData = profileRes.customer || profileRes; } catch (err) { throw err; }
        try { const cardRes = await api('/api/v1/customers/me/card'); cardData = cardRes.card || cardRes; stampsData = cardRes.stamps || []; }
        catch { cardData = { stamp_count: profileData?.stamp_count || 0 }; }
        setProfile(profileData);
        setCard(cardData);
        setStamps(stampsData);
      }, []);

      const handleLogin = async (customerData) => {
        try {
          await loadUserData(); setAuthState('verified'); setTab('home');
          const sc = card?.stamp_count ?? customerData?.stamp_count ?? 0;
          const cc = customerData?.completed_cards || customerData?.cards_completed || 0;
          if (sc === 2 && cc === 0) { setTimeout(() => showToast("Welcome to the Club! You scored a bonus stamp \u{1F41F}", 'success'), 600); }
        } catch { clearToken(); setAuthState('login'); showToast('Sign in failed \u2014 please try again', 'error'); }
      };

      const handleSignOut = () => { clearToken(); _specialCardsCache = []; setProfile(null); setCard(null); setStamps([]); setAuthState('login'); setTab('home'); setShowPrivacy(false); };

      if (authState === 'loading') return html`<div class="app-shell"><div class="loading-screen"><div class="spinner"></div></div></div>`;
      if (showPrivacy) return html`<div class="app-shell"><${PrivacyPolicyScreen} onBack=${() => setShowPrivacy(false)} /></div>`;
      if (authState === 'login') return html`<div class="app-shell"><${LoginScreen} onLogin=${handleLogin} onSwitch=${() => setAuthState('signup')} onForgot=${() => setAuthState('forgot')} showToast=${showToast} />${ToastEl}</div>`;
      if (authState === 'signup') return html`<div class="app-shell"><${SignupScreen} onSignup=${handleLogin} onSwitch=${() => setAuthState('login')} showToast=${showToast} signupSource=${signupSource} onShowPrivacy=${openPrivacy} marketingCopy=${marketingCopy} />${ToastEl}</div>`;
      if (authState === 'forgot') return html`<div class="app-shell"><${ForgotPasswordScreen} onBack=${() => setAuthState('login')} />${ToastEl}</div>`;
      if (authState === 'reset') return html`<div class="app-shell"><${ResetPasswordScreen} token=${resetToken} onDone=${() => setAuthState('login')} />${ToastEl}</div>`;

      return html`
        <div class="app-shell">
          ${tab === 'home' ? html`<${HomeScreen} profile=${profile} card=${card} stamps=${stamps} onRefresh=${loadUserData} showToast=${showToast} marketingCopy=${marketingCopy} onNavigate=${setTab} />` : tab === 'collection' ? html`<${CollectionScreen} profile=${profile} showToast=${showToast} />` : tab === 'rewards' ? html`<${RewardsScreen} profile=${profile} />` : html`<${ProfileScreen} profile=${profile} card=${card} onSignOut=${handleSignOut} onShowPrivacy=${openPrivacy} showToast=${showToast} marketingCopy=${marketingCopy} />`}
          <nav class="bottom-nav"><button class="nav-tab ${tab === 'home' ? 'active' : ''}" onClick=${() => setTab('home')}><span class="nav-ico"><${IconHome} /></span><span>Home</span></button><button class="nav-tab ${tab === 'rewards' ? 'active' : ''}" onClick=${() => setTab('rewards')}><span class="nav-ico"><${IconRewards} /></span><span>Rewards</span></button><button class="nav-tab ${tab === 'collection' ? 'active' : ''}" onClick=${() => setTab('collection')}><span class="nav-ico"><${IconCollection} /></span><span>Collection</span></button><button class="nav-tab ${tab === 'profile' ? 'active' : ''}" onClick=${() => setTab('profile')}><span class="nav-ico"><${IconProfile} /></span><span>Profile</span></button></nav>
          ${ToastEl}
        </div>`;
    }

    // ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
    // MOUNT + SERVICE WORKER
    // ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
    createRoot(document.getElementById('root')).render(html`<${App} />`);
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register(`/sw.js?v=${Date.now()}`).then(() => console.log('[SW] Registered')).catch(err => console.warn('[SW] Failed:', err)); }
  </script>
</body>
</html>

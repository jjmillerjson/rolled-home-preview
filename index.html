<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Rolled — Animation Lab</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="https://use.typekit.net/htl2spk.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: only dark;
      --nori: #00392c; --nori-light: #004d3b; --nori-dark: #002a20; --nori-deep: #001f17;
      --wasabi: #d4fb6f; --wasabi-glow: rgba(212,251,111,0.35); --wasabi-dim: rgba(212,251,111,0.12);
      --kewpie: #fefaf0; --kewpie-dim: rgba(254,250,240,0.55); --kewpie-muted: rgba(254,250,240,0.28); --kewpie-faint: rgba(254,250,240,0.10);
      --gold: #D4A017; --diamond: #B9F2FF;
      --fd: 'gelica', Georgia, serif;
      --fb: 'Manrope', system-ui, sans-serif;
      --r-xl: 20px; --r-lg: 16px; --r-md: 12px; --r-sm: 8px;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #00392c; overflow: hidden; }
    body { font-family: var(--fb); color: var(--kewpie); }
    #root { height: 100%; }

    /* ══════ LAB SHELL ══════ */
    .lab { position: fixed; inset: 0; display: flex; flex-direction: column; }
    .lab-stage { flex: 1; position: relative; overflow: hidden; background:
      radial-gradient(120% 80% at 50% 12%, #05463731 0%, transparent 60%), var(--nori); }
    .lab-hint { position: absolute; top: 0; left: 0; right: 0; padding: 16px 22px 10px; text-align: center; pointer-events: none; }
    .lab-hint h1 { font-family: var(--fd); font-size: 18px; font-weight: 700; color: var(--kewpie); }
    .lab-hint p { font-size: 11.5px; color: var(--kewpie-dim); margin-top: 3px; }
    .lab-panel { background: var(--nori-deep); border-top: 1px solid var(--kewpie-faint); padding: 12px 14px calc(12px + env(safe-area-inset-bottom, 0px)); }
    .lab-row { display: flex; align-items: center; gap: 8px; }
    .lab-cap { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--kewpie-muted); margin: 9px 0 5px; }
    .chiprow { display: flex; gap: 6px; }
    .chip { flex: 1; text-align: center; font-size: 11px; font-weight: 700; padding: 8px 3px; border-radius: 9px; background: rgba(254,250,240,0.06); color: var(--kewpie-dim); border: 1px solid transparent; cursor: pointer; -webkit-tap-highlight-color: transparent; white-space: nowrap; }
    .chip.is-on { background: var(--wasabi); color: var(--nori); }
    .btn { flex: 1; text-align: center; font-size: 14px; font-weight: 700; padding: 12px; border-radius: 12px; cursor: pointer; border: none; -webkit-tap-highlight-color: transparent; font-family: var(--fb); }
    .btn-before { background: rgba(254,250,240,0.08); color: var(--kewpie); border: 1px solid var(--kewpie-faint); }
    .btn-after { background: var(--wasabi); color: var(--nori); }
    .btn-after:active, .btn-before:active { transform: scale(0.98); }
    .lab-next { margin-top: 10px; font-size: 11px; color: var(--kewpie-muted); text-align: center; }

    /* ══════ SHARED OVERLAY ══════ */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes overlayFadeOut { from { opacity: 1; } to { opacity: 0; } }
    .celebrate-overlay {
      position: absolute; inset: 0; z-index: 200;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(0, 57, 44, 0.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      opacity: 0; animation: fadeIn 0.2s ease forwards; padding: 32px 24px; text-align: center; overflow: hidden;
    }
    .overlay-fading { animation: overlayFadeOut 0.35s var(--ease) forwards !important; pointer-events: none; }
    .celebrate-overlay-card { display: flex; flex-direction: column; align-items: center; text-align: center; z-index: 52; position: relative; }

    /* ══════ BEFORE (verbatim from the live app) ══════ */
    @keyframes confettiFromLeft { 0% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateX(55vw) translateY(25vh) rotate(540deg); opacity: 0; } }
    @keyframes confettiFromRight { 0% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateX(-55vw) translateY(25vh) rotate(-540deg); opacity: 0; } }
    @keyframes popperIn { 0% { opacity: 0; transform: scale(0.3) rotate(-20deg); } 70% { opacity: 1; transform: scale(1.15) rotate(5deg); } 100% { opacity: 1; transform: scale(1) rotate(0deg); } }
    @keyframes popperBounce { 0%, 100% { transform: translateY(0) rotate(0deg); } 30% { transform: translateY(-8px) rotate(-3deg); } 60% { transform: translateY(-4px) rotate(2deg); } }
    @keyframes coneShake { 0% { transform: rotate(0); } 25% { transform: rotate(-8deg); } 50% { transform: rotate(6deg); } 75% { transform: rotate(-3deg); } 100% { transform: rotate(0); } }
    @keyframes starPop { 0% { opacity: 0; transform: scale(0); } 60% { opacity: 1; transform: scale(1.3); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes glowPulse { 0% { opacity: 0; transform: scale(0.5); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.5; transform: scale(1); } }
    @keyframes titlePop { 0% { opacity: 0; transform: scale(0.5); } 70% { opacity: 1; transform: scale(1.08); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes celebFadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes celebSlideIn { to { opacity: 1; transform: translateY(0); } }
    .celebrate-title { font-family: var(--fd); font-size: 34px; font-weight: 700; color: var(--wasabi); line-height: 1.1; }
    .celebrate-title--hero { font-size: 48px; line-height: 1; margin-top: 6px; opacity: 0; transform: scale(0.5); animation: titlePop 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.25s forwards; }
    .celebrate-subtitle { font-family: var(--fb); font-size: 14px; font-weight: 500; color: var(--kewpie-dim); letter-spacing: 0.5px; margin-top: 6px; opacity: 0; animation: celebFadeUp 0.4s ease 0.6s forwards; }
    .celebrate-sub { font-family: var(--fd); font-size: 18px; font-weight: 500; color: var(--kewpie); margin-top: 4px; }
    .celebrate-dismiss { margin-top: 20px; font-family: var(--fb); font-size: 14px; font-weight: 600; color: var(--kewpie-dim); background: none; border: 1.5px solid rgba(254,250,240,0.25); border-radius: 12px; padding: 12px 32px; cursor: pointer; }
    .popper-wrap { width: 80px; height: 80px; opacity: 0; animation: popperIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.1s forwards, popperBounce 1.5s ease-in-out 0.6s 2; }
    .popper-cone { animation: coneShake 0.4s ease-out 0.3s both; transform-origin: 880px 650px; }
    .popper-star { opacity: 0; animation: starPop 0.6s ease-out forwards; transform-origin: 1050px 480px; }
    .title-glow { position: absolute; top: -60px; width: 180px; height: 180px; background: radial-gradient(circle, rgba(212,251,111,0.12) 0%, transparent 70%); border-radius: 50%; opacity: 0; animation: glowPulse 1.8s ease 0.2s forwards; z-index: -1; }
    .reward-section { display: flex; flex-direction: column; align-items: center; text-align: center; opacity: 0; transform: translateY(16px); animation: celebSlideIn 0.5s cubic-bezier(0.22,1,0.36,1) 1.8s forwards; }
    .reward-badge { background: var(--wasabi); color: var(--nori); border-radius: 14px; padding: 16px 28px; text-align: center; margin-top: 24px; }
    .reward-badge-title { font-family: var(--fd); font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
    .reward-message { font-family: var(--fb); font-size: 13px; font-weight: 400; color: var(--kewpie-dim); margin-top: 14px; max-width: 270px; line-height: 1.5; text-align: center; }
    .confetti-wrap { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 51; }
    .confetti-piece { position: absolute; }

    /* ══════ AFTER — "Rolled Reward" motion language ══════ */
    .rc-overlay {
      position: absolute; inset: 0; z-index: 200; overflow: hidden;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 32px 24px; text-align: center;
      background: radial-gradient(115% 75% at 50% 40%, #0a5442 0%, #00392c 52%, #002018 100%);
      opacity: 0; animation: fadeIn 0.25s ease forwards;
    }
    .rc-herowrap { position: relative; width: 104px; height: 104px; display: flex; align-items: center; justify-content: center; }
    .rc-burst { position: absolute; inset: 0; pointer-events: none; }
    .rc-glow { position: absolute; top: 50%; left: 50%; width: 360px; height: 360px; margin: -180px 0 0 -180px; border-radius: 50%; opacity: 0;
      background: radial-gradient(circle, rgba(212,251,111,0.30) 0%, rgba(212,251,111,0.07) 42%, transparent 68%);
      animation: rcGlow 1.3s ease-out 0.08s forwards; pointer-events: none; }
    @keyframes rcGlow { 0% { opacity: 0; transform: scale(0.35); } 45% { opacity: 1; transform: scale(1.06); } 100% { opacity: 0.72; transform: scale(1); } }

    /* hero: pop in, then a gentle living idle (float + breathing glow) */
    .rc-heroidle { width: 100%; height: 100%; position: relative; z-index: 3; animation: rcHeroIdle 3.6s ease-in-out 0.95s infinite; }
    .rc-hero { width: 100%; height: 100%; opacity: 0; transform: scale(0.3); filter: drop-shadow(0 8px 22px rgba(212,251,111,0.4));
      animation: rcHeroPop 0.55s cubic-bezier(0.34,1.56,0.64,1) 0.1s forwards, rcHeroGlow 3.8s ease-in-out 0.95s infinite; }
    @keyframes rcHeroPop { 0% { opacity: 0; transform: scale(0.3) rotate(-12deg); } 60% { opacity: 1; transform: scale(1.12) rotate(4deg); } 100% { opacity: 1; transform: scale(1) rotate(0); } }
    @keyframes rcHeroIdle { 0%,100% { transform: translateY(0) rotate(-1.4deg); } 50% { transform: translateY(-5px) rotate(1.4deg); } }
    @keyframes rcHeroGlow { 0%,100% { filter: drop-shadow(0 8px 20px rgba(212,251,111,0.3)); } 50% { filter: drop-shadow(0 11px 30px rgba(212,251,111,0.62)); } }

    /* Card Redeemed hero — wasabi disc + tick, with an optional branded pattern */
    .rc-tickcircle { position: absolute; inset: 0; border-radius: 50%; overflow: hidden; background: var(--wasabi); display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 26px rgba(212,251,111,0.42); opacity: 0; transform: scale(0.3); }
    .rc-tickcircle--solo { animation: rcHeroPop 0.55s cubic-bezier(0.34,1.56,0.64,1) 0.1s forwards; }
    .rc-tick-mark { width: 52px; height: 52px; position: relative; z-index: 2; }
    .rc-tick-mark path { stroke: #00392c; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 40; stroke-dashoffset: 40; animation: rcTick 0.5s ease 0.6s forwards; }
    @keyframes rcTick { to { stroke-dashoffset: 0; } }
    .rc-tick-pat { position: absolute; inset: 0; z-index: 1; overflow: hidden; border-radius: 50%; opacity: 0; animation: rcPatIn 0.6s ease 0.38s forwards; }
    @keyframes rcPatIn { to { opacity: 1; } }
    .rc-tick-pat--fish svg { position: absolute; top: 50%; left: 50%; width: 82%; height: auto; transform: translate(-50%,-50%); }
    .rc-tick-pat--waves .rc-wavedrift { animation: rcWaveDrift 7s linear infinite; }
    @keyframes rcWaveDrift { to { transform: translateX(-50px); } }

    /* rings (Fan + Shoal) */
    .rc-ring { position: absolute; top: 50%; left: 50%; width: 104px; height: 104px; margin: -52px 0 0 -52px; border: 2.5px solid rgba(212,251,111,0.75); border-radius: 50%; opacity: 0; animation: rcRing 0.75s ease-out 0.2s forwards; }
    .rc-ring2 { border-color: rgba(254,250,240,0.35); animation-delay: 0.34s; }
    @keyframes rcRing { 0% { opacity: 0.85; transform: scale(0.5); } 100% { opacity: 0; transform: scale(3.4); } }

    .rc-fish { position: absolute; top: 50%; left: 50%; opacity: 0; pointer-events: none; will-change: transform, opacity; z-index: 2; }
    @keyframes rcFishFly { 0% { opacity: 0; transform: translate(-50%,-50%) scale(0.2) rotate(0deg); } 22% { opacity: 1; } 100% { opacity: 0; transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(var(--sc)) rotate(var(--rot)); } }
    @keyframes rcSwim { 0% { opacity: 0; transform: translate(calc(-50% + var(--sx)), calc(-50% + var(--sy))) scale(var(--sc)) rotate(var(--rot)); } 14% { opacity: 1; } 82% { opacity: 1; } 100% { opacity: 0; transform: translate(calc(-50% + var(--ex)), calc(-50% + var(--ey))) scale(var(--sc)) rotate(var(--rot)); } }
    @keyframes rcRise { 0% { opacity: 0; transform: translate(calc(-50% + var(--sx)), calc(-50% + var(--sy))) scale(var(--sc)) rotate(var(--rot)); } 18% { opacity: 1; } 78% { opacity: 1; } 100% { opacity: 0; transform: translate(calc(-50% + var(--ex)), calc(-50% + var(--ey))) scale(var(--sc)) rotate(var(--rot)); } }
    .rc-bubble { position: absolute; top: 50%; left: 50%; border-radius: 50%; background: radial-gradient(circle at 34% 30%, rgba(212,251,111,0.85), rgba(212,251,111,0.18)); opacity: 0; will-change: transform, opacity; z-index: 1; }
    .rc-ripple { position: absolute; top: 50%; left: 50%; width: 104px; height: 104px; margin: -52px 0 0 -52px; border: 2px solid rgba(212,251,111,0.6); border-radius: 50%; opacity: 0; animation: rcRippleK 1.5s ease-out forwards; }
    @keyframes rcRippleK { 0% { opacity: 0.85; transform: scale(0.35); } 100% { opacity: 0; transform: scale(4.6); } }
    .rc-spark { position: absolute; top: 50%; left: 50%; color: #fff; opacity: 0; line-height: 1; animation: rcSpark 1.1s ease-in-out forwards; text-shadow: 0 0 6px rgba(212,251,111,0.8); }
    @keyframes rcSpark { 0% { opacity: 0; transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(0.2) rotate(0deg); } 45% { opacity: 1; transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(1) rotate(35deg); } 100% { opacity: 0; transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(0.4) rotate(60deg); } }

    .rc-title { font-family: var(--fd); font-size: 50px; line-height: 1; font-weight: 700; color: var(--wasabi); margin-top: 16px; opacity: 0; transform: scale(0.5); animation: rcTitle 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.5s forwards; position: relative; z-index: 3; text-shadow: 0 2px 26px rgba(212,251,111,0.28); }
    .rc-title--redeem { font-size: 40px; }
    @keyframes rcTitle { 0% { opacity: 0; transform: scale(0.5); } 70% { opacity: 1; transform: scale(1.06); } 100% { opacity: 1; transform: scale(1); } }
    .rc-sub { font-family: var(--fb); font-size: 15px; font-weight: 500; color: var(--kewpie-dim); margin-top: 9px; opacity: 0; animation: rcUp 0.4s ease 0.82s forwards; position: relative; z-index: 3; max-width: 300px; }

    /* reward — shared wrapper (entrance) + swappable styles */
    .rc-reward { margin-top: 22px; opacity: 0; transform: translateY(14px); animation: rcUp 0.5s var(--ease) 1.08s forwards; position: relative; z-index: 3; display: flex; flex-direction: column; align-items: center; }
    .rc-reward-eyebrow { font-family: var(--fb); font-size: 10.5px; font-weight: 700; letter-spacing: 1.6px; text-transform: uppercase; color: var(--kewpie-muted); margin-bottom: 9px; }
    .rc-reward-badge { position: relative; overflow: hidden; background: var(--wasabi); color: var(--nori); border-radius: 16px; padding: 15px 30px; font-family: var(--fd); font-size: 22px; font-weight: 700; box-shadow: 0 12px 34px rgba(212,251,111,0.26); }
    .rc-reward-badge::after { content: ''; position: absolute; top: -20%; left: -70%; width: 45%; height: 140%; background: linear-gradient(100deg, transparent, rgba(255,255,255,0.9), transparent); transform: skewX(-16deg); animation: rcShine 1.0s ease 1.55s; }
    @keyframes rcShine { 0% { left: -70%; } 100% { left: 150%; } }
    .rw-ticket { position: relative; overflow: hidden; background: var(--wasabi); color: var(--nori); border-radius: 14px; padding: 12px 34px 15px; box-shadow: 0 12px 30px rgba(212,251,111,0.22); }
    .rw-ticket::before, .rw-ticket::after { content: ''; position: absolute; top: 50%; width: 16px; height: 16px; background: #04241b; border-radius: 50%; transform: translateY(-50%); }
    .rw-ticket::before { left: -8px; } .rw-ticket::after { right: -8px; }
    .rw-tlabel { display: block; font-family: var(--fb); font-size: 9px; font-weight: 800; letter-spacing: 1.6px; text-transform: uppercase; color: rgba(0,57,44,0.55); padding-bottom: 8px; margin-bottom: 8px; border-bottom: 1.5px dashed rgba(0,57,44,0.28); }
    .rw-ticket .rw-val { font-family: var(--fd); font-size: 21px; font-weight: 700; }
    .rw-outline { background: linear-gradient(rgba(212,251,111,0.07), rgba(212,251,111,0.02)); border: 1.5px solid rgba(212,251,111,0.5); border-radius: 16px; padding: 15px 30px; box-shadow: 0 0 34px rgba(212,251,111,0.14), inset 0 0 22px rgba(212,251,111,0.05); }
    .rw-outline .rw-val { font-family: var(--fd); font-size: 22px; font-weight: 700; color: var(--wasabi); }
    .rw-plate .rw-val { font-family: var(--fd); font-size: 27px; font-weight: 700; color: var(--wasabi); line-height: 1.12; text-shadow: 0 2px 20px rgba(212,251,111,0.25); max-width: 300px; }
    .rw-plate .rw-rule { width: 46px; height: 3px; border-radius: 2px; background: var(--wasabi); margin: 13px auto 0; box-shadow: 0 0 12px rgba(212,251,111,0.55); }

    /* Card Redeemed — homepage-style tier progression (animated forward) */
    .rc-tp { margin-top: 20px; width: 252px; opacity: 0; animation: rcUp 0.4s ease 1.2s forwards; position: relative; z-index: 3; }
    .rc-tp-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .rc-tp-lbl { font-family: var(--fb); font-size: 13px; font-weight: 700; color: var(--kewpie); }
    .rc-tp-plus { font-family: var(--fb); font-size: 9.5px; font-weight: 800; letter-spacing: 0.4px; text-transform: uppercase; color: var(--nori); background: var(--wasabi); border-radius: 20px; padding: 2px 8px; opacity: 0; transform: scale(0.6); }
    .rc-tp-plus.is-on { animation: rcPlusPop 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    @keyframes rcPlusPop { 0% { opacity: 0; transform: scale(0.6); } 60% { opacity: 1; transform: scale(1.12); } 100% { opacity: 1; transform: scale(1); } }
    .rc-tp-barrow { display: flex; align-items: center; gap: 10px; }
    /* Diamond "top tier" crest (Card Redeemed, when already maxed) — uses the real Diamond finish */
    .rc-maxcrest { margin-top: 20px; position: relative; display: inline-flex; align-items: center; justify-content: center; gap: 13px; padding: 14px 30px; border-radius: 16px; overflow: hidden; opacity: 0; animation: rcUp 0.45s ease 1.2s forwards; box-shadow: 0 10px 32px rgba(185,242,255,0.28), inset 0 0 0 1px rgba(255,255,255,0.25); }
    .rc-maxcrest-bg { position: absolute; inset: 0; z-index: 0; }
    .rc-maxcrest-veil { position: absolute; inset: 0; z-index: 1; background: linear-gradient(90deg, rgba(0,24,30,0.34), rgba(0,24,30,0.2) 50%, rgba(0,24,30,0.34)); }
    .rc-maxcrest-in { position: relative; z-index: 2; display: flex; align-items: center; justify-content: center; gap: 11px; }
    .rc-maxcrest-eyebrow { font-family: var(--fb); font-size: 9px; font-weight: 800; letter-spacing: 2.4px; text-transform: uppercase; color: rgba(255,255,255,0.88); }
    .rc-maxcrest-title { font-family: var(--fd); font-size: 18px; font-weight: 700; color: #fff; text-shadow: 0 1px 5px rgba(0,0,0,0.5); line-height: 1.05; margin-top: 1px; }
    .rc-maxcrest-spark { position: absolute; color: #fff; opacity: 0; z-index: 3; animation: tgrTwinkle 2.6s ease-in-out infinite; text-shadow: 0 0 7px rgba(255,255,255,0.9); pointer-events: none; }
    .tier-progress-bar { height: 5px; background: rgba(254,250,240,0.12); border-radius: 3px; overflow: hidden; position: relative; }
    .tier-progress-fill { height: 100%; border-radius: 3px; position: relative; overflow: hidden; }
    .tier-progress-fill::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.4) 50%, transparent 100%); animation: tierSweep 2.5s ease-in-out infinite; }
    @keyframes tierSweep { 0% { transform: translateX(-100%); } 100% { transform: translateX(200%); } }
    .tier-goal-roo { position: relative; display: inline-flex; flex: none; }
    .tgr-spark { position: absolute; color: #fff; font-size: 7px; opacity: 0; animation: tgrTwinkle 2.6s ease-in-out infinite; pointer-events: none; }
    .tgr-spark--a { top: -3px; right: -4px; animation-delay: 0.2s; }
    .tgr-spark--b { bottom: -2px; left: -3px; font-size: 5px; animation-delay: 1.2s; }
    @keyframes tgrTwinkle { 0%, 100% { opacity: 0; transform: scale(0.4); } 45% { opacity: 1; transform: scale(1); } 65% { opacity: 0; transform: scale(0.5); } }

    .rc-msg { font-family: var(--fb); font-size: 13px; color: var(--kewpie-dim); margin-top: 15px; max-width: 285px; line-height: 1.55; opacity: 0; animation: rcUp 0.4s ease 1.42s forwards; position: relative; z-index: 3; }
    .rc-btn { margin-top: 22px; font-family: var(--fb); font-size: 14px; font-weight: 700; color: var(--kewpie); background: none; border: 1.5px solid rgba(254,250,240,0.28); border-radius: 12px; padding: 12px 40px; cursor: pointer; opacity: 0; animation: rcUp 0.4s ease 1.6s forwards; position: relative; z-index: 3; }
    .rc-btn:active { transform: scale(0.97); background: rgba(254,250,240,0.05); }
    @keyframes rcUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ══════ TIER-UP — BEFORE: the real club card (on-card morph) ══════ */

          </div>
          <div class="card-body">
            <div class="stamp-grid">
              ${Array.from({length:8},(_,i)=>html`<div class="stamp-slot ${i<stampCount?'stamp-filled':''} ${wiggle}" key=${i} style=${(phase==='newstamp'&&i===0&&i<stampCount)?{animation:'stampPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both'}:{}}><${SoyFish} filled=${i<stampCount} /></div>`)}
            </div>
          </div>
        </div>
      </div></div>`;
    }
    // AFTER — full-screen "tier unlocked" announcement (Rolled Reward language)
    function TierUpAfter({ tier, onClose }) {
      const [fading, setFading] = useState(false);
      const close = () => { setFading(true); setTimeout(onClose, 350); };
      const toTier = tier === 'standard' ? 'silver' : tier;
      const col = TIER_COLORS[toTier] || 'var(--wasabi)';
      const reward = REWARD_LADDER[toTier];
      const sparks = Array.from({length:10},(_,i)=>{ const ang=(-Math.PI/2)+((i-4.5)/9)*(Math.PI*1.5); const d=118+((i*43)%78); return { x:Math.cos(ang)*d, y:Math.sin(ang)*d-10, size:8+((i*11)%8), delay:0.28+(i%6)*0.05 }; });
      return html`<div class="rc-overlay ${fading?'overlay-fading':''}">
        <div class="tu-medalwrap">
          <div class="rc-glow"></div>
          <div class="tu-ring" style=${{ '--tu-col': col }}></div>
          ${sparks.map((s,i)=>html`<div key=${i} class="tu-spark" style=${{ '--x':s.x+'px','--y':s.y+'px', color: col, fontSize:s.size+'px', animationDelay:s.delay+'s' }}>✦</div>`)}
          <div class="tu-medalidle"><div class="tu-medal">
            <div class="tu-medal-tex card-header--${toTier}"></div>
            <div class="tu-medal-scrim"></div>
            <div class="tu-medal-roo"><${RooIcon} color="#00392c" size=${52} /></div>
          </div></div>
        </div>
        <div class="tu-eyebrow" style=${{ '--tu-col': col }}>Tier Unlocked</div>
        <div class="tu-title">You're ${cap(toTier)}!</div>
        <div class="rc-reward rw-plate" style=${{ marginTop:'18px' }}><div class="rc-reward-eyebrow">Your new reward</div><div class="rw-val">${reward}</div><div class="rw-rule"></div></div>
        <button class="rc-btn" style=${{ animation:'rcUp 0.4s ease 1.5s forwards' }} onClick=${close}>Let's go!</button>
      </div>`;
    }

    // REFRESHED morph — the on-card level-up, rebuilt: snappy (~2.6s) + a clean
    // texture crossfade (old header fades out to reveal the new one underneath —
    // no flickery overlay-then-swap).
    function TierUpMorph({ tier, style='polish', onClose, onDone }) {
      const toTier = tier === 'standard' ? 'silver' : tier;
      const fromTier = prevTierOf(toTier);
      const col = TIER_COLORS[toTier] || '#d4fb6f';
      const [showNew, setShowNew] = useState(false);
      const [smode, setSmode] = useState('full');           // full(8) → clearing → fresh(1)
      const [fx, setFx] = useState(style === 'shake' ? 'shake' : '');
      const glowRef = useRef(null);
      useEffect(() => {
        const T = [];
        const fadeGlow = (ms) => T.push(setTimeout(() => { if (glowRef.current){ glowRef.current.style.transition='opacity 0.5s'; glowRef.current.style.opacity='0'; } }, ms));
        if (style === 'flip') {
          T.push(setTimeout(() => { setShowNew(true); setSmode('fresh'); }, 420));
          fadeGlow(950);
          T.push(setTimeout(() => { onDone && onDone(); }, 1250));
        } else if (style === 'shake') {
          T.push(setTimeout(() => setFx('intense'), 520));
          T.push(setTimeout(() => { setFx('release'); setShowNew(true); setSmode('clearing'); }, 950));
          T.push(setTimeout(() => setSmode('fresh'), 1350));
          fadeGlow(1500);
          T.push(setTimeout(() => { onDone && onDone(); }, 2000));
        } else {
          T.push(setTimeout(() => setSmode('clearing'), 800));
          T.push(setTimeout(() => setSmode('fresh'), 1450));
          fadeGlow(1400);
          T.push(setTimeout(() => { onDone && onDone(); }, 1900));
        }
        return () => T.forEach(clearTimeout);
      }, []);
      const hdr = (t, isNew) => html`<div class="card-header card-header--${t} ${isNew?'tuh-new':''}">
        ${t==='standard' ? html`<${WaveLines} />` : null}
        ${t!=='standard' ? html`<div class="card-header-scrim ${t==='diamond'?'card-header-scrim--diamond':''}"></div>` : null}
        ${t!=='standard' ? html`<div class="card-header-shimmer card-header-shimmer--${t}"><div class="shim1"></div></div>` : null}
        <div class="card-header-content"><div><span class="card-header-title">Rolled Club Card</span><span class="card-header-name">${FIRST_NAME}</span></div>${t!=='standard' ? html`<span class="card-tier-badge ${isNew?'tup-badge-new':''}">${cap(t)}</span>` : null}</div>
      </div>`;
      const wrapCls = style === 'flip' ? 'tup-flip' : 'tup-lift';
      const stampCls = (i) => smode==='clearing' ? 'tu-clearout' : (smode==='full' && style==='shake') ? (fx==='intense'?'stamp-wiggle-intense':'stamp-wiggle') : '';
      const stampSt = (i) => (smode==='fresh' && i===0) ? { animation:'stampPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both' } : (smode==='clearing' ? { animationDelay:(i*0.03)+'s' } : {});
      return html`<div class="tu-stage" onClick=${onClose}><div class="${wrapCls}" style=${{ position:'relative', width:'320px', maxWidth:'86vw' }}>
        <div ref=${glowRef} class="tier-upgrade-glow" style=${{ borderColor: col+'99', opacity: 1, boxShadow: '0 0 26px '+col+'66' }}></div>
        <div class="club-card">
          ${style==='shake' && fx==='release' ? html`<div class="tup-flash"></div>` : null}
          ${style==='polish'
            ? html`<div class="tuh">${hdr(fromTier,false)}${hdr(toTier,true)}</div>`
            : html`<div class="tuh">${hdr(showNew?toTier:fromTier, false)}</div>`}
          ${style==='polish' ? html`<div class="tup-sheen"></div>` : null}
          <div class="card-body">
            <div class="stamp-grid">
              ${Array.from({length:8},(_,i)=>html`<div class="stamp-slot ${stampCls(i)}" key=${i} style=${stampSt(i)}><${SoyFish} filled=${smode==='fresh' ? (i===0) : true} /></div>`)}
            </div>
          </div>
        </div>
      </div></div>`;
    }
    // TANDEM — play the morph and the announcement together, either order.
    function TierUpTandem({ tier, order, style, onClose }) {
      const [step, setStep] = useState(0);
      if (order === 'AM') {
        return step === 0
          ? html`<${TierUpAfter} tier=${tier} onClose=${() => setStep(1)} />`
          : html`<${TierUpMorph} tier=${tier} style=${style} onClose=${onClose} />`;
      }
      return html`<div>
        <${TierUpMorph} tier=${tier} style=${style} onClose=${step===0 ? onClose : (() => {})} onDone=${() => setStep(1)} />
        ${step===1 ? html`<${TierUpAfter} tier=${tier} onClose=${onClose} />` : null}
      </div>`;
    }

    // ═══════════ LAB SHELL ═══════════
    function App() {
      const [tier, setTier] = useState('gold');
      const [effect, setEffect] = useState('rising');
      const [rstyle, setRstyle] = useState('plate');
      const [rtick, setRtick] = useState('plain');
      const [anim, setAnim] = useState('tierup');
      const [tuplay, setTuplay] = useState('AM');
      const [mstyle, setMstyle] = useState('polish');
      const [active, setActive] = useState(null);
      const runRef = useRef(0);
      const play = (kind) => { runRef.current += 1; setActive({ kind, run: runRef.current }); };
      const close = () => setActive(null);
      const overlay = () => {
        if (!active) return null;
        const k = active.kind, r = active.run;
        if (k === 'celeb-before') return html`<${BeforeCelebration} key=${'cb'+r} onClose=${close} />`;
        if (k === 'celeb-after') return html`<${AfterCelebration} key=${'ca'+r} tier=${tier} variant=${effect} rstyle=${rstyle} onClose=${close} />`;
        if (k === 'redeem-before') return html`<${BeforeRedeemed} key=${'rb'+r} tier=${tier} onClose=${close} />`;
        if (k === 'redeem-after') return html`<${AfterRedeemed} key=${'ra'+r} tier=${tier} tickStyle=${rtick} onClose=${close} />`;
        if (k === 'tierup-before') return html`<${TierUpCard} key=${'tub'+r} tier=${tier} onClose=${close} />`;
        if (k === 'tierup-after') {
          if (tuplay === 'morph') return html`<${TierUpMorph} key=${'tum'+r+mstyle} tier=${tier} style=${mstyle} onClose=${close} />`;
          if (tuplay === 'announce') return html`<${TierUpAfter} key=${'tua'+r} tier=${tier} onClose=${close} />`;
          return html`<${TierUpTandem} key=${'tut'+r+tuplay+mstyle} tier=${tier} order=${tuplay} style=${mstyle} onClose=${close} />`;
        }
        return null;
      };
      return html`<div class="lab">
        <div class="lab-stage">
          <div class="lab-hint">
            <h1>Animation Lab</h1>
            <p>${anim==='celeb' ? '8/8 celebration' : anim==='redeem' ? 'Card redeemed' : 'Tier-up'} — Before vs After</p>
          </div>
          ${overlay()}
        </div>
        <div class="lab-panel">
          <div class="chiprow" style=${{ marginBottom: '10px' }}>
            ${ANIMS.map(([k,label]) => html`<div key=${k} class="chip ${anim===k?'is-on':''}" onClick=${() => setAnim(k)}>${label}</div>`)}
          </div>
          <div class="lab-row">
            <button class="btn btn-before" onClick=${() => play(anim+'-before')}>▶ Before</button>
            <button class="btn btn-after" onClick=${() => play(anim+'-after')}>▶ After</button>
          </div>
          ${anim==='celeb' ? html`
            <div class="lab-cap">Fish effect</div>
            <div class="chiprow">${EFFECTS.map(([k, label]) => html`<div key=${k} class="chip ${effect===k?'is-on':''}" onClick=${() => setEffect(k)}>${label}</div>`)}</div>
            <div class="lab-cap">Reward style</div>
            <div class="chiprow">${REWARD_STYLES.map(([k, label]) => html`<div key=${k} class="chip ${rstyle===k?'is-on':''}" onClick=${() => setRstyle(k)}>${label}</div>`)}</div>
          ` : anim==='redeem' ? html`
            <div class="lab-cap">Tick style</div>
            <div class="chiprow">${TICK_STYLES.map(([k, label]) => html`<div key=${k} class="chip ${rtick===k?'is-on':''}" onClick=${() => setRtick(k)}>${label}</div>`)}</div>
          ` : anim==='tierup' ? html`
            <div class="lab-cap">After plays</div>
            <div class="chiprow">${TU_PLAYS.map(([k, label]) => html`<div key=${k} class="chip ${tuplay===k?'is-on':''}" onClick=${() => setTuplay(k)}>${label}</div>`)}</div>
            <div class="lab-cap">Morph style</div>
            <div class="chiprow">${MORPH_STYLES.map(([k, label]) => html`<div key=${k} class="chip ${mstyle===k?'is-on':''}" onClick=${() => setMstyle(k)}>${label}</div>`)}</div>
          ` : null}
          <div class="lab-cap">${anim==='tierup' ? 'Upgrade to' : 'Tier reward'}</div>
          <div class="chiprow">${TIERS.map(t => html`<div key=${t} class="chip ${tier===t?'is-on':''}" onClick=${() => setTier(t)}>${cap(t)}</div>`)}</div>
        </div>
      </div>`;
    }
    createRoot(document.getElementById('root')).render(html`<${App} />`);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Rolled — Animation Lab</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="https://use.typekit.net/htl2spk.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: only dark;
      --nori: #00392c; --nori-light: #004d3b; --nori-dark: #002a20; --nori-deep: #001f17;
      --wasabi: #d4fb6f; --wasabi-glow: rgba(212,251,111,0.35); --wasabi-dim: rgba(212,251,111,0.12);
      --kewpie: #fefaf0; --kewpie-dim: rgba(254,250,240,0.55); --kewpie-muted: rgba(254,250,240,0.28); --kewpie-faint: rgba(254,250,240,0.10);
      --gold: #D4A017; --diamond: #B9F2FF;
      --fd: 'gelica', Georgia, serif;
      --fb: 'Manrope', system-ui, sans-serif;
      --r-xl: 20px; --r-lg: 16px; --r-md: 12px; --r-sm: 8px;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #00392c; overflow: hidden; }
    body { font-family: var(--fb); color: var(--kewpie); }
    #root { height: 100%; }

    /* ══════ LAB SHELL ══════ */
    .lab { position: fixed; inset: 0; display: flex; flex-direction: column; }
    .lab-stage { flex: 1; position: relative; overflow: hidden; background:
      radial-gradient(120% 80% at 50% 12%, #05463731 0%, transparent 60%), var(--nori); }
    .lab-hint { position: absolute; top: 0; left: 0; right: 0; padding: 16px 22px 10px; text-align: center; pointer-events: none; }
    .lab-hint h1 { font-family: var(--fd); font-size: 18px; font-weight: 700; color: var(--kewpie); }
    .lab-hint p { font-size: 11.5px; color: var(--kewpie-dim); margin-top: 3px; }
    .lab-panel { background: var(--nori-deep); border-top: 1px solid var(--kewpie-faint); padding: 12px 14px calc(12px + env(safe-area-inset-bottom, 0px)); }
    .lab-row { display: flex; align-items: center; gap: 8px; }
    .lab-cap { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--kewpie-muted); margin: 9px 0 5px; }
    .chiprow { display: flex; gap: 6px; }
    .chip { flex: 1; text-align: center; font-size: 11px; font-weight: 700; padding: 8px 3px; border-radius: 9px; background: rgba(254,250,240,0.06); color: var(--kewpie-dim); border: 1px solid transparent; cursor: pointer; -webkit-tap-highlight-color: transparent; white-space: nowrap; }
    .chip.is-on { background: var(--wasabi); color: var(--nori); }
    .btn { flex: 1; text-align: center; font-size: 14px; font-weight: 700; padding: 12px; border-radius: 12px; cursor: pointer; border: none; -webkit-tap-highlight-color: transparent; font-family: var(--fb); }
    .btn-before { background: rgba(254,250,240,0.08); color: var(--kewpie); border: 1px solid var(--kewpie-faint); }
    .btn-after { background: var(--wasabi); color: var(--nori); }
    .btn-after:active, .btn-before:active { transform: scale(0.98); }
    .lab-next { margin-top: 10px; font-size: 11px; color: var(--kewpie-muted); text-align: center; }

    /* ══════ SHARED OVERLAY ══════ */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes overlayFadeOut { from { opacity: 1; } to { opacity: 0; } }
    .celebrate-overlay {
      position: absolute; inset: 0; z-index: 200;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(0, 57, 44, 0.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      opacity: 0; animation: fadeIn 0.2s ease forwards; padding: 32px 24px; text-align: center; overflow: hidden;
    }
    .overlay-fading { animation: overlayFadeOut 0.35s var(--ease) forwards !important; pointer-events: none; }
    .celebrate-overlay-card { display: flex; flex-direction: column; align-items: center; text-align: center; z-index: 52; position: relative; }

    /* ══════ BEFORE (verbatim from the live app) ══════ */
    @keyframes confettiFromLeft { 0% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateX(55vw) translateY(25vh) rotate(540deg); opacity: 0; } }
    @keyframes confettiFromRight { 0% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateX(-55vw) translateY(25vh) rotate(-540deg); opacity: 0; } }
    @keyframes popperIn { 0% { opacity: 0; transform: scale(0.3) rotate(-20deg); } 70% { opacity: 1; transform: scale(1.15) rotate(5deg); } 100% { opacity: 1; transform: scale(1) rotate(0deg); } }
    @keyframes popperBounce { 0%, 100% { transform: translateY(0) rotate(0deg); } 30% { transform: translateY(-8px) rotate(-3deg); } 60% { transform: translateY(-4px) rotate(2deg); } }
    @keyframes coneShake { 0% { transform: rotate(0); } 25% { transform: rotate(-8deg); } 50% { transform: rotate(6deg); } 75% { transform: rotate(-3deg); } 100% { transform: rotate(0); } }
    @keyframes starPop { 0% { opacity: 0; transform: scale(0); } 60% { opacity: 1; transform: scale(1.3); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes glowPulse { 0% { opacity: 0; transform: scale(0.5); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.5; transform: scale(1); } }
    @keyframes titlePop { 0% { opacity: 0; transform: scale(0.5); } 70% { opacity: 1; transform: scale(1.08); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes celebFadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes celebSlideIn { to { opacity: 1; transform: translateY(0); } }
    .celebrate-title { font-family: var(--fd); font-size: 34px; font-weight: 700; color: var(--wasabi); line-height: 1.1; }
    .celebrate-title--hero { font-size: 48px; line-height: 1; margin-top: 6px; opacity: 0; transform: scale(0.5); animation: titlePop 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.25s forwards; }
    .celebrate-subtitle { font-family: var(--fb); font-size: 14px; font-weight: 500; color: var(--kewpie-dim); letter-spacing: 0.5px; margin-top: 6px; opacity: 0; animation: celebFadeUp 0.4s ease 0.6s forwards; }
    .celebrate-sub { font-family: var(--fd); font-size: 18px; font-weight: 500; color: var(--kewpie); margin-top: 4px; }
    .celebrate-dismiss { margin-top: 20px; font-family: var(--fb); font-size: 14px; font-weight: 600; color: var(--kewpie-dim); background: none; border: 1.5px solid rgba(254,250,240,0.25); border-radius: 12px; padding: 12px 32px; cursor: pointer; }
    .popper-wrap { width: 80px; height: 80px; opacity: 0; animation: popperIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.1s forwards, popperBounce 1.5s ease-in-out 0.6s 2; }
    .popper-cone { animation: coneShake 0.4s ease-out 0.3s both; transform-origin: 880px 650px; }
    .popper-star { opacity: 0; animation: starPop 0.6s ease-out forwards; transform-origin: 1050px 480px; }
    .title-glow { position: absolute; top: -60px; width: 180px; height: 180px; background: radial-gradient(circle, rgba(212,251,111,0.12) 0%, transparent 70%); border-radius: 50%; opacity: 0; animation: glowPulse 1.8s ease 0.2s forwards; z-index: -1; }
    .reward-section { display: flex; flex-direction: column; align-items: center; text-align: center; opacity: 0; transform: translateY(16px); animation: celebSlideIn 0.5s cubic-bezier(0.22,1,0.36,1) 1.8s forwards; }
    .reward-badge { background: var(--wasabi); color: var(--nori); border-radius: 14px; padding: 16px 28px; text-align: center; margin-top: 24px; }
    .reward-badge-title { font-family: var(--fd); font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
    .reward-message { font-family: var(--fb); font-size: 13px; font-weight: 400; color: var(--kewpie-dim); margin-top: 14px; max-width: 270px; line-height: 1.5; text-align: center; }
    .confetti-wrap { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 51; }
    .confetti-piece { position: absolute; }

    /* ══════ AFTER — "Rolled Reward" motion language ══════ */
    .rc-overlay {
      position: absolute; inset: 0; z-index: 200; overflow: hidden;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 32px 24px; text-align: center;
      background: radial-gradient(115% 75% at 50% 40%, #0a5442 0%, #00392c 52%, #002018 100%);
      opacity: 0; animation: fadeIn 0.25s ease forwards;
    }
    .rc-herowrap { position: relative; width: 104px; height: 104px; display: flex; align-items: center; justify-content: center; }
    .rc-burst { position: absolute; inset: 0; pointer-events: none; }
    .rc-glow { position: absolute; top: 50%; left: 50%; width: 360px; height: 360px; margin: -180px 0 0 -180px; border-radius: 50%; opacity: 0;
      background: radial-gradient(circle, rgba(212,251,111,0.30) 0%, rgba(212,251,111,0.07) 42%, transparent 68%);
      animation: rcGlow 1.3s ease-out 0.08s forwards; pointer-events: none; }
    @keyframes rcGlow { 0% { opacity: 0; transform: scale(0.35); } 45% { opacity: 1; transform: scale(1.06); } 100% { opacity: 0.72; transform: scale(1); } }

    /* hero: pop in, then a gentle living idle (float + breathing glow) */
    .rc-heroidle { width: 100%; height: 100%; position: relative; z-index: 3; animation: rcHeroIdle 3.6s ease-in-out 0.95s infinite; }
    .rc-hero { width: 100%; height: 100%; opacity: 0; transform: scale(0.3); filter: drop-shadow(0 8px 22px rgba(212,251,111,0.4));
      animation: rcHeroPop 0.55s cubic-bezier(0.34,1.56,0.64,1) 0.1s forwards, rcHeroGlow 3.8s ease-in-out 0.95s infinite; }
    @keyframes rcHeroPop { 0% { opacity: 0; transform: scale(0.3) rotate(-12deg); } 60% { opacity: 1; transform: scale(1.12) rotate(4deg); } 100% { opacity: 1; transform: scale(1) rotate(0); } }
    @keyframes rcHeroIdle { 0%,100% { transform: translateY(0) rotate(-1.4deg); } 50% { transform: translateY(-5px) rotate(1.4deg); } }
    @keyframes rcHeroGlow { 0%,100% { filter: drop-shadow(0 8px 20px rgba(212,251,111,0.3)); } 50% { filter: drop-shadow(0 11px 30px rgba(212,251,111,0.62)); } }

    /* rings (Fan + Shoal) */
    .rc-ring { position: absolute; top: 50%; left: 50%; width: 104px; height: 104px; margin: -52px 0 0 -52px; border: 2.5px solid rgba(212,251,111,0.75); border-radius: 50%; opacity: 0; animation: rcRing 0.75s ease-out 0.2s forwards; }
    .rc-ring2 { border-color: rgba(254,250,240,0.35); animation-delay: 0.34s; }
    @keyframes rcRing { 0% { opacity: 0.85; transform: scale(0.5); } 100% { opacity: 0; transform: scale(3.4); } }

    .rc-fish { position: absolute; top: 50%; left: 50%; opacity: 0; pointer-events: none; will-change: transform, opacity; z-index: 2; }
    @keyframes rcFishFly { 0% { opacity: 0; transform: translate(-50%,-50%) scale(0.2) rotate(0deg); } 22% { opacity: 1; } 100% { opacity: 0; transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(var(--sc)) rotate(var(--rot)); } }
    @keyframes rcSwim { 0% { opacity: 0; transform: translate(calc(-50% + var(--sx)), calc(-50% + var(--sy))) scale(var(--sc)) rotate(var(--rot)); } 14% { opacity: 1; } 82% { opacity: 1; } 100% { opacity: 0; transform: translate(calc(-50% + var(--ex)), calc(-50% + var(--ey))) scale(var(--sc)) rotate(var(--rot)); } }
    @keyframes rcRise { 0% { opacity: 0; transform: translate(calc(-50% + var(--sx)), calc(-50% + var(--sy))) scale(var(--sc)) rotate(var(--rot)); } 18% { opacity: 1; } 78% { opacity: 1; } 100% { opacity: 0; transform: translate(calc(-50% + var(--ex)), calc(-50% + var(--ey))) scale(var(--sc)) rotate(var(--rot)); } }
    .rc-bubble { position: absolute; top: 50%; left: 50%; border-radius: 50%; background: radial-gradient(circle at 34% 30%, rgba(212,251,111,0.85), rgba(212,251,111,0.18)); opacity: 0; will-change: transform, opacity; z-index: 1; }
    .rc-ripple { position: absolute; top: 50%; left: 50%; width: 104px; height: 104px; margin: -52px 0 0 -52px; border: 2px solid rgba(212,251,111,0.6); border-radius: 50%; opacity: 0; animation: rcRippleK 1.5s ease-out forwards; }
    @keyframes rcRippleK { 0% { opacity: 0.85; transform: scale(0.35); } 100% { opacity: 0; transform: scale(4.6); } }
    .rc-spark { position: absolute; top: 50%; left: 50%; color: #fff; opacity: 0; line-height: 1; animation: rcSpark 1.1s ease-in-out forwards; text-shadow: 0 0 6px rgba(212,251,111,0.8); }
    @keyframes rcSpark { 0% { opacity: 0; transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(0.2) rotate(0deg); } 45% { opacity: 1; transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(1) rotate(35deg); } 100% { opacity: 0; transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(0.4) rotate(60deg); } }

    /* claimed ✓ badge (Card Redeemed) */
    .rc-check { position: absolute; right: -2px; bottom: 8px; width: 38px; height: 38px; border-radius: 50%; background: var(--wasabi); display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 16px rgba(0,20,12,0.45); opacity: 0; transform: scale(0); animation: rcCheckPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.42s forwards; z-index: 6; }
    @keyframes rcCheckPop { 0% { opacity: 0; transform: scale(0) rotate(-25deg); } 60% { opacity: 1; transform: scale(1.18) rotate(6deg); } 100% { opacity: 1; transform: scale(1) rotate(0); } }
    .rc-check svg { width: 20px; height: 20px; }
    .rc-check path { stroke: #00392c; stroke-width: 3.2; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 26; stroke-dashoffset: 26; animation: rcTick 0.4s ease 0.72s forwards; }
    @keyframes rcTick { to { stroke-dashoffset: 0; } }

    .rc-title { font-family: var(--fd); font-size: 50px; line-height: 1; font-weight: 700; color: var(--wasabi); margin-top: 16px; opacity: 0; transform: scale(0.5); animation: rcTitle 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.5s forwards; position: relative; z-index: 3; text-shadow: 0 2px 26px rgba(212,251,111,0.28); }
    .rc-title--redeem { font-size: 40px; }
    @keyframes rcTitle { 0% { opacity: 0; transform: scale(0.5); } 70% { opacity: 1; transform: scale(1.06); } 100% { opacity: 1; transform: scale(1); } }
    .rc-sub { font-family: var(--fb); font-size: 15px; font-weight: 500; color: var(--kewpie-dim); margin-top: 9px; opacity: 0; animation: rcUp 0.4s ease 0.82s forwards; position: relative; z-index: 3; max-width: 300px; }

    /* reward — shared wrapper (entrance) + swappable styles */
    .rc-reward { margin-top: 22px; opacity: 0; transform: translateY(14px); animation: rcUp 0.5s var(--ease) 1.08s forwards; position: relative; z-index: 3; display: flex; flex-direction: column; align-items: center; }
    .rc-reward-eyebrow { font-family: var(--fb); font-size: 10.5px; font-weight: 700; letter-spacing: 1.6px; text-transform: uppercase; color: var(--kewpie-muted); margin-bottom: 9px; }
    .rc-reward-badge { position: relative; overflow: hidden; background: var(--wasabi); color: var(--nori); border-radius: 16px; padding: 15px 30px; font-family: var(--fd); font-size: 22px; font-weight: 700; box-shadow: 0 12px 34px rgba(212,251,111,0.26); }
    .rc-reward-badge::after { content: ''; position: absolute; top: -20%; left: -70%; width: 45%; height: 140%; background: linear-gradient(100deg, transparent, rgba(255,255,255,0.9), transparent); transform: skewX(-16deg); animation: rcShine 1.0s ease 1.55s; }
    @keyframes rcShine { 0% { left: -70%; } 100% { left: 150%; } }
    .rw-ticket { position: relative; overflow: hidden; background: var(--wasabi); color: var(--nori); border-radius: 14px; padding: 12px 34px 15px; box-shadow: 0 12px 30px rgba(212,251,111,0.22); }
    .rw-ticket::before, .rw-ticket::after { content: ''; position: absolute; top: 50%; width: 16px; height: 16px; background: #04241b; border-radius: 50%; transform: translateY(-50%); }
    .rw-ticket::before { left: -8px; } .rw-ticket::after { right: -8px; }
    .rw-tlabel { display: block; font-family: var(--fb); font-size: 9px; font-weight: 800; letter-spacing: 1.6px; text-transform: uppercase; color: rgba(0,57,44,0.55); padding-bottom: 8px; margin-bottom: 8px; border-bottom: 1.5px dashed rgba(0,57,44,0.28); }
    .rw-ticket .rw-val { font-family: var(--fd); font-size: 21px; font-weight: 700; }
    .rw-outline { background: linear-gradient(rgba(212,251,111,0.07), rgba(212,251,111,0.02)); border: 1.5px solid rgba(212,251,111,0.5); border-radius: 16px; padding: 15px 30px; box-shadow: 0 0 34px rgba(212,251,111,0.14), inset 0 0 22px rgba(212,251,111,0.05); }
    .rw-outline .rw-val { font-family: var(--fd); font-size: 22px; font-weight: 700; color: var(--wasabi); }
    .rw-plate .rw-val { font-family: var(--fd); font-size: 27px; font-weight: 700; color: var(--wasabi); line-height: 1.12; text-shadow: 0 2px 20px rgba(212,251,111,0.25); max-width: 300px; }
    .rw-plate .rw-rule { width: 46px; height: 3px; border-radius: 2px; background: var(--wasabi); margin: 13px auto 0; box-shadow: 0 0 12px rgba(212,251,111,0.55); }

    /* redeemed tier chip + progress */
    .rc-tierchip { margin-top: 18px; display: inline-flex; align-items: center; gap: 8px; padding: 9px 16px; border-radius: 30px; background: rgba(254,250,240,0.06); border: 1px solid var(--kewpie-faint); opacity: 0; animation: rcUp 0.4s ease 1.15s forwards; position: relative; z-index: 3; }
    .rc-tierchip span { font-family: var(--fb); font-size: 13px; font-weight: 700; }
    .rc-tierprog { margin-top: 12px; width: 214px; opacity: 0; animation: rcUp 0.4s ease 1.32s forwards; position: relative; z-index: 3; }
    .rc-tierbar { height: 5px; border-radius: 3px; background: rgba(254,250,240,0.1); overflow: hidden; }
    .rc-tierbar > i { display: block; height: 100%; border-radius: 3px; }
    .rc-tierprog p { font-family: var(--fb); font-size: 10.5px; color: var(--kewpie-muted); margin-top: 6px; }

    .rc-msg { font-family: var(--fb); font-size: 13px; color: var(--kewpie-dim); margin-top: 15px; max-width: 285px; line-height: 1.55; opacity: 0; animation: rcUp 0.4s ease 1.42s forwards; position: relative; z-index: 3; }
    .rc-btn { margin-top: 22px; font-family: var(--fb); font-size: 14px; font-weight: 700; color: var(--kewpie); background: none; border: 1.5px solid rgba(254,250,240,0.28); border-radius: 12px; padding: 12px 40px; cursor: pointer; opacity: 0; animation: rcUp 0.4s ease 1.6s forwards; position: relative; z-index: 3; }
    .rc-btn:active { transform: scale(0.97); background: rgba(254,250,240,0.05); }
    @keyframes rcUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import React, { useState, useEffect, useRef, useMemo } from 'https://esm.sh/react@18.2.0';
    import htm from 'https://esm.sh/htm@3.1.1';
    import { FISH_BODY, FISH_DETAIL, FISH_EYE, FISH_SCALES, ROO_PATHS } from './fish.js';
    const html = htm.bind(React.createElement);

    function SoyFish({ filled = true }) {
      const bodyFill = filled ? '#d4fb6f' : 'rgba(254,250,240,0.08)';
      const detailFill = filled ? '#00392c' : 'transparent';
      return html`<svg viewBox="0 0 823.78 481.7" xmlns="http://www.w3.org/2000/svg" style=${{ display:'block', width:'100%', height:'100%' }}>
        ${filled ? html`<circle cx=${FISH_EYE.cx} cy=${FISH_EYE.cy} r=${FISH_EYE.r} fill=${detailFill} /><path d=${FISH_DETAIL} fill=${detailFill} />` : null}
        <path d=${FISH_BODY} fill=${bodyFill} />
        ${filled
          ? html`<g>${FISH_SCALES.map((d, i) => html`<path key=${i} d=${d} fill=${bodyFill} />`)}</g>`
          : html`<circle cx=${FISH_EYE.cx} cy=${FISH_EYE.cy} r=${FISH_EYE.r} fill="rgba(254,250,240,0.06)" />`}
      </svg>`;
    }
    function RooIcon({ color = '#d4fb6f', size = 22 }) {
      return html`<svg viewBox="0 0 459.53 399.43" width=${size} height=${size*0.87} xmlns="http://www.w3.org/2000/svg" style=${{ display:'block' }}><g fill=${color}>${ROO_PATHS.map((d,i)=>html`<path key=${i} d=${d} />`)}</g></svg>`;
    }

    const CONFETTI_COLORS = ['#d4fb6f', '#fefaf0', '#D4A017', '#4ade80', '#B9F2FF'];
    const REWARD_LADDER = { standard: '2 Free Rolls', silver: '2 Free Rolls + Any Dip', gold: '2 Free Rolls + Aussie Snack', platinum: '3 Free Rolls + Any Dip', diamond: '4 Free Rolls or 3 Free Rolls + Drink' };
    const TIER_COLORS = { silver:'#A8A9AD', gold:'#D4A017', platinum:'#B0C4DE', diamond:'#B9F2FF' };
    const TIER_ORDER = ['standard','silver','gold','platinum','diamond'];
    const nextTierOf = (t) => { const i = TIER_ORDER.indexOf(t); return i>=0 && i<TIER_ORDER.length-1 ? TIER_ORDER[i+1] : null; };
    const cap = (s) => s ? s.charAt(0).toUpperCase()+s.slice(1) : s;
    const TIERS = ['standard','silver','gold','platinum','diamond'];
    const EFFECTS = [['rising','Rising'],['shoal','Shoal'],['ripple','Ripple'],['fan','Fan']];
    const REWARD_STYLES = [['plate','Plate'],['ticket','Ticket'],['outline','Outline'],['block','Block']];
    const ANIMS = [['celeb','8/8 Celebration'],['redeem','Card Redeemed']];

    // ═══════════ BEFORE: 8/8 celebration (current live app) ═══════════
    function CelebrationConfetti() {
      const wrapRef = useRef(null);
      const pieces = useMemo(() => Array.from({ length: 60 }, (_, i) => { const fromLeft = i % 2 === 0; const size = 6 + ((i*53)%100)/100 * 10; return { fromLeft, top: (15 + ((i*37)%100)/100 * 55) + '%', bg: CONFETTI_COLORS[i % CONFETTI_COLORS.length], delay: (((i*29)%100)/100 * 0.4) + 's', duration: (1 + ((i*17)%100)/100 * 1.2) + 's', size: size + 'px', radius: (i%2 ? '50%' : '2px') }; }), []);
      useEffect(() => { const t = setTimeout(() => { if (wrapRef.current) { wrapRef.current.style.transition = 'opacity 0.4s'; wrapRef.current.style.opacity = '0'; } }, 1600); return () => clearTimeout(t); }, []);
      return html`<div ref=${wrapRef} class="confetti-wrap">${pieces.map((p, i) => html`<div key=${i} class="confetti-piece" style=${{ [p.fromLeft ? 'left' : 'right']: '-10px', top: p.top, width: p.size, height: p.size, background: p.bg, borderRadius: p.radius, animation: (p.fromLeft ? 'confettiFromLeft ' : 'confettiFromRight ') + p.duration + ' cubic-bezier(0.25,0.46,0.45,0.94) ' + p.delay + ' forwards' }} />`)}</div>`;
    }
    function BeforeCelebration({ onClose }) {
      const [fading, setFading] = useState(false);
      const close = () => { setFading(true); setTimeout(onClose, 350); };
      return html`<div class="celebrate-overlay ${fading ? 'overlay-fading' : ''}">
        <${CelebrationConfetti} />
        <div class="celebrate-overlay-card">
          <div class="title-glow"></div>
          <div class="popper-wrap">
            <svg viewBox="700 340 520 400" xmlns="http://www.w3.org/2000/svg" style=${{ width:'100%',height:'100%',overflow:'visible' }}>
              <g class="popper-cone"><path d="M1004.1,618.8c14.3-2.5,1.4-24.4,5.5-31.2,1.3-2.2,9.3-3.4,10.4-.8,4,9.5,5.5,24.7.3,35-2.7,5.3-10.2,9.5-16.4,11.6l-242.6,83.9c-2.1.7-4.3.7-6.4,0-13.3-4.4-22-15.8-23.1-30.1s.6-5,2.2-6.9l163.9-203.2c9.2-11.4,25-7.2,36.2,0s5.8,9.6,2.4,14.1h0c-3.2,4.2-20.9-14.4-27.4-6.3-4.9,6.2-3.3,16.7-1,24.1,12.6,39.8,37.3,74.7,70.6,100.1,6.8,5.2,18,10.9,25.3,9.6M980.5,626.4c-28.2-18.2-45-42.1-64.3-66.6-8.4-10.6-20.9-17.7-30.4-28.1s-11.1-4.3-14.9.4l-5.9,7.2c-3.1,3.8-2.9,9.3.4,12.8,31.7,34,70.6,59.6,115,74.2M902.1,654.7l14.1-5.1c7.9-2.9,8.8-13.7,1.5-17.8-26.6-14.9-49.9-30.9-70.7-52.6-4.1-4.3-11-4-14.8.6l-6,7.5c-3.1,3.8-2.8,9.4.6,12.9,21.8,22.8,47.4,40.3,75.4,54.4M829.5,679.5l14.9-5.4c7.6-2.7,8.8-12.9,2.1-17.4-13.5-9-25.7-18.3-37.8-29.7s-10.6-3.4-14.2.9l-6.3,7.5c-3.4,4-3,10,.9,13.6,12.7,11.6,25.7,21.8,40.4,30.5" fill="#d4fb6f"/></g>
              <polygon class="popper-star" style=${{ animationDelay:'0.3s' }} points="1020.8 404.9 1003.9 402.7 1018.8 394.5 1010 379.9 1025.7 386.5 1031.6 370.6 1036.2 386.9 1052.4 381.6 1042.5 395.4 1056.7 404.7 1039.8 405.6 1041.4 422.5 1030.1 409.8 1017.9 421.5" fill="#d4fb6f"/>
              <polygon class="popper-star" style=${{ animationDelay:'0.45s' }} points="1128.4 514.7 1111.6 512.6 1126.4 504.4 1117.7 489.8 1133.3 496.4 1139.2 480.5 1143.9 496.8 1160.1 491.4 1150.1 505.2 1164.2 514.5 1147.4 515.4 1149 532.3 1137.7 519.7 1125.5 531.4" fill="#d4fb6f"/>
              <polygon class="popper-star" style=${{ animationDelay:'0.55s' }} points="1138.9 418 1122.1 415.8 1136.9 407.6 1128.1 393 1143.8 399.6 1149.7 383.8 1154.4 400 1170.4 394.7 1160.6 408.5 1174.9 417.8 1157.9 418.7 1159.5 435.6 1148.2 422.9 1136 434.6" fill="#d4fb6f"/>
              <polygon class="popper-star" style=${{ animationDelay:'0.6s' }} points="965.8 545.5 948.9 543.3 963.8 535.1 955 520.5 970.7 527.1 976.6 511.2 981.3 527.5 997.3 522.2 987.5 536 1001.6 545.2 984.8 546.2 986.4 563.1 975.1 550.4 962.9 562.2" fill="#d4fb6f"/>
            </svg>
          </div>
          <div class="celebrate-title celebrate-title--hero">You Beauty!</div>
          <div class="celebrate-subtitle">Card complete — 8 out of 8</div>
          <div class="reward-section">
            <div class="reward-badge"><div class="reward-badge-title">NEXT VISIT = 2 FREE ROLLS</div></div>
            <div class="reward-message">Show your completed club card to Rolled staff when you next visit — they'll sort you out!</div>
            <button class="celebrate-dismiss" style=${{ opacity: 0, animation: 'celebFadeUp 0.4s ease 2.5s forwards' }} onClick=${close}>Sweet as, let's go!</button>
          </div>
        </div>
      </div>`;
    }

    // ═══════════ BEFORE: Card Redeemed (current live app) ═══════════
    function Confetti({ count = 40 }) {
      const pieces = useMemo(() => Array.from({ length: count }, (_, i) => { const fromLeft = i % 2 === 0; return { top: (10 + ((i*37)%80)) + '%', side: fromLeft ? 'left' : 'right', bg: CONFETTI_COLORS[i % CONFETTI_COLORS.length], delay: (((i*29)%150)/100) + 's', duration: (1.5 + ((i*17)%200)/100) + 's', size: (8 + ((i*13)%10)) + 'px', rotation: (i%2 ? 'rotate(45deg)' : 'rotate(0deg)') }; }), [count]);
      return html`<div class="confetti-wrap">${pieces.map((p, i) => html`<div key=${i} class="confetti-piece" style=${{ top: p.top, [p.side]: '-10px', background: p.bg, width: p.size, height: p.size, animationName: p.side === 'left' ? 'confettiFromLeft' : 'confettiFromRight', animationDelay: p.delay, animationDuration: p.duration, animationIterationCount: '1', animationTimingFunction: 'linear', animationFillMode: 'forwards', transform: p.rotation }} />`)}</div>`;
    }
    function BeforeRedeemed({ tier, onClose }) {
      const [fading, setFading] = useState(false);
      const close = () => { setFading(true); setTimeout(onClose, 350); };
      const hasTier = tier !== 'standard';
      const tierColor = TIER_COLORS[tier] || '#d4fb6f';
      const nt = nextTierOf(tier);
      return html`<div class="celebrate-overlay ${fading ? 'overlay-fading' : ''}">
        <${Confetti} count=${40} />
        <div class="celebrate-overlay-card">
          <div style=${{ width:'48px', margin:'0 auto 8px' }}><${SoyFish} /></div>
          <div class="celebrate-title">Card Redeemed!</div>
          <div class="celebrate-sub">Nice one, mate!</div>
          <p style=${{ marginTop:'10px', maxWidth:'280px', fontSize:'13px', lineHeight:1.5, color:'var(--kewpie-dim)', fontFamily:'var(--fb)' }}>Your free rolls have been claimed. Fresh card, fresh start — let's fill it up again!</p>
          ${hasTier ? html`<div style=${{ marginTop:'16px', padding:'10px 20px', background:'rgba(254,250,240,0.06)', borderRadius:'12px', display:'flex', alignItems:'center', gap:'8px', justifyContent:'center' }}><${RooIcon} color=${tierColor} size=${20} /><span style=${{ fontSize:'13px', fontWeight:700, color:tierColor }}>${cap(tier)} Member</span></div>` : null}
          ${nt ? html`<div style=${{ marginTop:'10px', width:'100%', maxWidth:'240px' }}><div style=${{ height:'4px', background:'rgba(254,250,240,0.08)', borderRadius:'2px', overflow:'hidden' }}><div style=${{ width:'55%', height:'100%', background: hasTier?tierColor:'var(--kewpie-muted)' }}></div></div><p style=${{ textAlign:'center', fontSize:'10px', color:'var(--kewpie-muted)', marginTop:'4px' }}>3 more cards to ${cap(nt)}</p></div>` : null}
          <button class="celebrate-dismiss" onClick=${close}>Let's go!</button>
        </div>
      </div>`;
    }

    // ═══════════ AFTER — 8/8 burst effect variants ═══════════
    function Burst({ variant }) {
      const fishEl = (key, styleVars, kf, dur, delay) => html`<div key=${key} class="rc-fish" style=${{ ...styleVars, animation: kf + ' ' + dur + 's ' + (kf==='rcFishFly'?'cubic-bezier(0.22,1,0.36,1) ':'ease-in-out ') + delay + 's forwards' }}><${SoyFish} /></div>`;
      if (variant === 'ripple') {
        const sparks = Array.from({ length: 8 }, (_, i) => { const ang = (i/8)*Math.PI*2 + 0.3; const d = 66 + ((i*37)%78); return { x: Math.cos(ang)*d, y: Math.sin(ang)*d - 8, size: 8 + ((i*11)%8), delay: 0.2 + (i%6)*0.08 }; });
        return html`<div class="rc-burst">
          ${[0,1,2,3].map(i => html`<div key=${'rp'+i} class="rc-ripple" style=${{ animationDelay: (i*0.22) + 's' }}></div>`)}
          ${sparks.map((s, i) => html`<div key=${'sp'+i} class="rc-spark" style=${{ '--x': s.x+'px', '--y': s.y+'px', fontSize: s.size+'px', animationDelay: s.delay+'s' }}>✦</div>`)}
        </div>`;
      }
      if (variant === 'shoal') {
        const fish = Array.from({ length: 9 }, (_, i) => { const lane = (i-4)/4; return { sx: -195-(i%3)*40, sy: lane*96 + ((i*17)%20-10), ex: 210+(i%3)*34, ey: lane*96 - 44 + ((i*13)%16-8), sc: 0.5+((i*29)%38)/100, rot: -8+((i*23)%14), size: 20+((i*19)%15), delay: (i%5)*0.11, dur: 1.15+((i*17)%45)/100 }; });
        return html`<div class="rc-burst">
          <div class="rc-ring"></div>
          ${fish.map((f, i) => fishEl('sh'+i, { width: f.size+'px', height: (f.size*0.6)+'px', '--sx': f.sx+'px', '--sy': f.sy+'px', '--ex': f.ex+'px', '--ey': f.ey+'px', '--sc': f.sc, '--rot': f.rot+'deg' }, 'rcSwim', f.dur, f.delay))}
        </div>`;
      }
      if (variant === 'rising') {
        const fish = Array.from({ length: 8 }, (_, i) => { const x = -108 + ((i*47)%224); return { sx: x, sy: 150+((i*31)%92), ex: x + (((i*13)%60)-30), ey: -172-((i*23)%48), sc: 0.5+((i*37)%34)/100, rot: -16+((i*29)%32), size: 19+((i*23)%16), delay: (i%6)*0.09, dur: 1.4+((i*19)%50)/100 }; });
        const bubbles = Array.from({ length: 7 }, (_, i) => { const x = -92 + ((i*53)%196); return { sx: x, sy: 150+((i*29)%88), ex: x + (((i*17)%40)-20), ey: -150-((i*19)%58), size: 6+((i*13)%9), delay: 0.1+(i%5)*0.12, dur: 1.5+((i*23)%50)/100 }; });
        return html`<div class="rc-burst">
          ${bubbles.map((b, i) => html`<div key=${'bb'+i} class="rc-bubble" style=${{ width: b.size+'px', height: b.size+'px', '--sx': b.sx+'px', '--sy': b.sy+'px', '--ex': b.ex+'px', '--ey': b.ey+'px', '--sc': 1, '--rot': '0deg', animation: 'rcRise ' + b.dur + 's ease-in-out ' + b.delay + 's forwards' }}></div>`)}
          ${fish.map((f, i) => fishEl('ri'+i, { width: f.size+'px', height: (f.size*0.6)+'px', '--sx': f.sx+'px', '--sy': f.sy+'px', '--ex': f.ex+'px', '--ey': f.ey+'px', '--sc': f.sc, '--rot': f.rot+'deg' }, 'rcRise', f.dur, f.delay))}
        </div>`;
      }
      const fish = Array.from({ length: 12 }, (_, i) => { const ang = (-Math.PI/2) + ((i - 5.5) / 11) * (Math.PI * 1.65) + ((i*29)%7 - 3) * 0.05; const dist = 128 + ((i*47)%95); return { tx: Math.cos(ang)*dist, ty: Math.sin(ang)*dist - 14, sc: 0.55+((i*31)%55)/100, rot: ((i*53)%90)-45, size: 20+((i*23)%16), delay: 0.16+(i%6)*0.035, dur: 0.72+((i*19)%42)/100 }; });
      return html`<div class="rc-burst">
        <div class="rc-ring"></div>
        <div class="rc-ring rc-ring2"></div>
        ${fish.map((f, i) => fishEl('fn'+i, { width: f.size+'px', height: (f.size*0.6)+'px', '--tx': f.tx+'px', '--ty': f.ty+'px', '--sc': f.sc, '--rot': f.rot+'deg' }, 'rcFishFly', f.dur, f.delay))}
      </div>`;
    }

    function RewardBlock({ styleKey, reward }) {
      if (styleKey === 'ticket') return html`<div class="rc-reward"><div class="rw-ticket"><span class="rw-tlabel">Reward</span><div class="rw-val">${reward}</div></div></div>`;
      if (styleKey === 'outline') return html`<div class="rc-reward"><div class="rc-reward-eyebrow">Your reward</div><div class="rw-outline"><div class="rw-val">${reward}</div></div></div>`;
      if (styleKey === 'block') return html`<div class="rc-reward"><div class="rc-reward-eyebrow">Your reward</div><div class="rc-reward-badge">${reward}</div></div>`;
      return html`<div class="rc-reward rw-plate"><div class="rc-reward-eyebrow">Your reward</div><div class="rw-val">${reward}</div><div class="rw-rule"></div></div>`;
    }

    function AfterCelebration({ tier, variant, rstyle, onClose }) {
      const [fading, setFading] = useState(false);
      const close = () => { setFading(true); setTimeout(onClose, 350); };
      const reward = REWARD_LADDER[tier] || REWARD_LADDER.standard;
      return html`<div class="rc-overlay ${fading ? 'overlay-fading' : ''}">
        <div class="rc-herowrap">
          <div class="rc-glow"></div>
          <${Burst} variant=${variant} />
          <div class="rc-heroidle"><div class="rc-hero"><${SoyFish} /></div></div>
        </div>
        <div class="rc-title">You Beauty!</div>
        <div class="rc-sub">That's great mate, you stamped 8/8</div>
        <${RewardBlock} styleKey=${rstyle} reward=${reward} />
        <div class="rc-msg">Claim your reward next time you visit Rolled. Our shout!</div>
        <button class="rc-btn" onClick=${close}>Sweet as</button>
      </div>`;
    }

    // ═══════════ AFTER: Card Redeemed (new — inherits the language, calmer) ═══════════
    function AfterRedeemed({ tier, onClose }) {
      const [fading, setFading] = useState(false);
      const close = () => { setFading(true); setTimeout(onClose, 350); };
      const hasTier = tier !== 'standard';
      const tierColor = TIER_COLORS[tier] || 'var(--wasabi)';
      const nt = nextTierOf(tier);
      const sparks = Array.from({ length: 6 }, (_, i) => { const ang = (i/6)*Math.PI*2 + 0.5; const d = 64 + ((i*41)%70); return { x: Math.cos(ang)*d, y: Math.sin(ang)*d - 8, size: 7 + ((i*11)%7), delay: 0.4 + (i%5)*0.09 }; });
      return html`<div class="rc-overlay ${fading ? 'overlay-fading' : ''}">
        <div class="rc-herowrap">
          <div class="rc-glow"></div>
          <div class="rc-burst">
            ${[0,1,2].map(i => html`<div key=${'rp'+i} class="rc-ripple" style=${{ animationDelay: (i*0.26) + 's' }}></div>`)}
            ${sparks.map((s, i) => html`<div key=${'sp'+i} class="rc-spark" style=${{ '--x': s.x+'px', '--y': s.y+'px', fontSize: s.size+'px', animationDelay: s.delay+'s' }}>✦</div>`)}
          </div>
          <div class="rc-heroidle">
            <div class="rc-hero"><${SoyFish} /></div>
            <div class="rc-check"><svg viewBox="0 0 24 24"><path d="M5 12.5l4.5 4.5L19 7.5"/></svg></div>
          </div>
        </div>
        <div class="rc-title rc-title--redeem">Card Redeemed!</div>
        <div class="rc-sub">Nice one, mate — enjoy your free rolls.</div>
        <div class="rc-msg" style=${{ animation: 'rcUp 0.4s ease 1.0s forwards', marginTop: '12px' }}>Your fresh card's ready — let's fill it up again.</div>
        ${hasTier ? html`<div class="rc-tierchip"><${RooIcon} color=${tierColor} size=${20} /><span style=${{ color: tierColor }}>${cap(tier)} Member</span></div>` : null}
        ${nt ? html`<div class="rc-tierprog"><div class="rc-tierbar"><i style=${{ width: '55%', background: hasTier?tierColor:'var(--wasabi)' }}></i></div><p>3 more cards to ${cap(nt)}</p></div>` : null}
        <button class="rc-btn" style=${{ animation: 'rcUp 0.4s ease 1.5s forwards' }} onClick=${close}>Let's go!</button>
      </div>`;
    }

    // ═══════════ LAB SHELL ═══════════
    function App() {
      const [tier, setTier] = useState('standard');
      const [effect, setEffect] = useState('rising');
      const [rstyle, setRstyle] = useState('plate');
      const [anim, setAnim] = useState('celeb');
      const [active, setActive] = useState(null);
      const runRef = useRef(0);
      const play = (kind) => { runRef.current += 1; setActive({ kind, run: runRef.current }); };
      const close = () => setActive(null);
      const overlay = () => {
        if (!active) return null;
        const k = active.kind, r = active.run;
        if (k === 'celeb-before') return html`<${BeforeCelebration} key=${'cb'+r} onClose=${close} />`;
        if (k === 'celeb-after') return html`<${AfterCelebration} key=${'ca'+r} tier=${tier} variant=${effect} rstyle=${rstyle} onClose=${close} />`;
        if (k === 'redeem-before') return html`<${BeforeRedeemed} key=${'rb'+r} tier=${tier} onClose=${close} />`;
        if (k === 'redeem-after') return html`<${AfterRedeemed} key=${'ra'+r} tier=${tier} onClose=${close} />`;
        return null;
      };
      return html`<div class="lab">
        <div class="lab-stage">
          <div class="lab-hint">
            <h1>Animation Lab</h1>
            <p>${anim==='celeb' ? '8/8 celebration' : 'Card redeemed'} — Before vs After</p>
          </div>
          ${overlay()}
        </div>
        <div class="lab-panel">
          <div class="chiprow" style=${{ marginBottom: '10px' }}>
            ${ANIMS.map(([k,label]) => html`<div key=${k} class="chip ${anim===k?'is-on':''}" onClick=${() => setAnim(k)}>${label}</div>`)}
          </div>
          <div class="lab-row">
            <button class="btn btn-before" onClick=${() => play(anim+'-before')}>▶ Before</button>
            <button class="btn btn-after" onClick=${() => play(anim+'-after')}>▶ After</button>
          </div>
          ${anim==='celeb' ? html`
            <div class="lab-cap">Fish effect</div>
            <div class="chiprow">${EFFECTS.map(([k, label]) => html`<div key=${k} class="chip ${effect===k?'is-on':''}" onClick=${() => setEffect(k)}>${label}</div>`)}</div>
            <div class="lab-cap">Reward style</div>
            <div class="chiprow">${REWARD_STYLES.map(([k, label]) => html`<div key=${k} class="chip ${rstyle===k?'is-on':''}" onClick=${() => setRstyle(k)}>${label}</div>`)}</div>
          ` : null}
          <div class="lab-cap">Tier reward</div>
          <div class="chiprow">${TIERS.map(t => html`<div key=${t} class="chip ${tier===t?'is-on':''}" onClick=${() => setTier(t)}>${cap(t)}</div>`)}</div>
          <div class="lab-next">Up next · Tier-up</div>
        </div>
      </div>`;
    }
    createRoot(document.getElementById('root')).render(html`<${App} />`);
  </script>
</body>
</html>
